<!DOCTYPE html>
<html>
<head>
  <title>Test FCM Token</title>
</head>
<body>
  <h2>Test Dapat Token FCM</h2>
  <button onclick="getToken()">Minta Izin & Dapat Token</button>
  <p id="result"></p>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDE1E4vN-3FFPn0OCyUuvE1fZizjsofYwk",
      authDomain: "didlin.firebaseapp.com",
      projectId: "didlin",
      storageBucket: "didlin.firebasestorage.app",
      messagingSenderId: "599992082188",
      appId: "1:599992082188:web:9924580056179ab634f329"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    async function getToken() {
      try {
        // Daftarkan service worker secara eksplisit dulu
        const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        console.log('Service Worker terdaftar:', registration);

        const permission = await Notification.requestPermission();
        if (permission !== 'granted') {
          document.getElementById('result').innerText = 'Izin ditolak';
          return;
        }

        const token = await messaging.getToken({
          vapidKey: 'BIlt2jx_KG6XXw9Enom9MhnORllt-h9HudlCFaKGhG0xjPC7AdzBxewuimdUg9v60LHAdQS3VxoMdc60KRq7gYI',
          serviceWorkerRegistration: registration
        });

        console.log('TOKEN:', token);
        document.getElementById('result').innerText = 'Token: ' + token;

        navigator.clipboard.writeText(token);
        alert('Token sudah dicopy ke clipboard! Cek juga di console (F12)');
      } catch (err) {
        console.error(err);
        document.getElementById('result').innerText = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
