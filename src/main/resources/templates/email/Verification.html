<!doctype html>
<html lang="id">
	<head>
		<meta charset="utf-8" />
		<title>Verifikasi Akun</title>
	</head>
	<body
		style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; background-color: #ffffff; color: #1f2937"
	>
		<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
			<tr>
				<td align="center" style="padding: 24px">
					<table
						role="presentation"
						width="600"
						cellspacing="0"
						cellpadding="0"
						border="0"
						style="border: 1px solid #e6eefb; border-radius: 6px"
					>
						<tr>
							<td style="padding: 20px; text-align: left">
								<h1 style="font-size: 20px; margin: 0 0 8px">Verifikasi Akun Kamu</h1>
								<p style="margin: 0 0 24px; line-height: 150%">
									Klik tombol berikut untuk verifikasi email Kamu dan aktivasi akun Kamu.
								</p>
								<div style="background-color: #f8fbff; padding: 16px; border-radius: 6px; border: 1px solid #dbeafe">
									<a
										th:href="${link}"
										target="_blank"
										style="
											background: #009ca4;
											color: #ffffff;
											text-decoration: none;
											padding: 12px 20px;
											border-radius: 4px;
											display: inline-block;
											font-weight: bold;
										"
									>
										Verifikasi
									</a>
									<p style="margin-top: 12px; margin-bottom: 0; line-height: 150%; font-size: 14px; color: #6b7280">
										Link berlaku hingga
										<strong th:text="${expiry}"></strong>
									</p>
								</div>
								<p style="margin-top: 20px; line-height: 150%; font-size: 13px; color: #6b7280">
									Jika Kamu tidak meminta verifikasi ini, mohon abaikan email ini.
								</p>
							</td>
						</tr>
					</table>
				</td>
			</tr>
		</table>
	</body>
</html>
