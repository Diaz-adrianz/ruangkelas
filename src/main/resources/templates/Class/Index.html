<!DOCTYPE html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/Home}"
>
    <head>
        <title>Kelas Saya</title>
    </head>
    <body>
        <div layout:fragment="content" class="w-full mx-auto max-w-5xl py-8 px-4">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Kelas Saya</h1>

                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </div>
                    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-48 mt-2 z-10">
                        <li><a href="#">Gabung Kelas</a></li>
                        <li><a th:href="@{/class/create}">Buat Kelas Baru</a></li>
                    </ul>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <a th:each="kelas : ${classes}" th:href="@{/class/{id}(id=${kelas.id})}"
                   class="card bg-base-100 rounded-2xl shadow-sm border border-base-200 hover:shadow-md transition cursor-pointer">
                    <div class="card-body py-5 px-6">
                        <h2 class="text-lg font-bold" th:text="${kelas.name}"></h2>
                        <div class="flex gap-2 mt-1 flex-wrap">
                            <span class="badge badge-soft badge-info gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 4H7a2 2 0 01-2-2V6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v3" />
                                </svg>
                                <span th:text="${kelas.course.name}"></span>
                            </span>
                            <span class="badge badge-soft badge-info gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                <span th:text="${kelas.year} + ' - ' + ${kelas.semester == 'ODD' ? 'Ganjil' : 'Genap'}"></span>
                            </span>
                        </div>
                    </div>
                </a>
            </div>

            <div th:if="${#lists.isEmpty(classes)}" class="text-center py-12 text-base-content/60">
                Belum ada kelas. Buat kelas pertamamu!
            </div>
        </div>
    </body>
</html>
