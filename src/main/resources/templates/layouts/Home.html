<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	data-theme="light"
>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title layout:title-pattern="$CONTENT_TITLE | RuangKelas">RuangKelas</title>
		<link rel="stylesheet" th:href="@{/css/styles.css}" />

		<!-- fonts  -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<nav class="navbar border-b border-base-300">
			<div class="w-full mx-auto max-w-5xl justify-between flex items-center">
				<img th:src="@{/images/LogoText.svg}" alt="Logo" class="w-40" />

				<div sec:authorize="isAuthenticated()" class="dropdown dropdown-end">
					<div tabindex="0" role="button" class="btn btn-ghost btn-circle">
						<div class="avatar avatar-placeholder">
							<div class="bg-neutral text-neutral-content w-10 rounded-full">
								<span sec:authentication="principal.initials"></span>
							</div>
						</div>
					</div>
					<div tabindex="0" class="dropdown-content rounded-box border mt-2 border-base-300 bg-base-100 w-52 z-10">
						<div class="px-4 py-2 border-b border-base-300 grid -space-y-px">
							<p sec:authentication="principal.name" class="text-lg font-bold"></p>
							<span th:text="'@' + ${#authentication.principal.username}" class="text-sm text-base-content/60"></span>
						</div>
						<ul class="menu w-full">
							<li><a href="/profil">Profil</a></li>
							<li class="text-error">
								<form method="post" th:action="@{/auth/logout}">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
									<button type="submit">Keluar</button>
								</form>
							</li>
						</ul>
					</div>
				</div>
			</div>
		</nav>
		<main layout:fragment="content"></main>
				<!-- ================================================
			PUSH NOTIFICATION SCRIPT
			Taruh ini sebelum </body> di:
			src/main/resources/templates/layouts/home.html
			================================================ -->

		<script th:inline="javascript">
			const firebaseConfig = {
				apiKey:            /*[[${firebaseConfig.apiKey}]]*/ "",
				authDomain:        /*[[${firebaseConfig.authDomain}]]*/ "",
				projectId:         /*[[${firebaseConfig.projectId}]]*/ "",
				storageBucket:     /*[[${firebaseConfig.storageBucket}]]*/ "",
				messagingSenderId: /*[[${firebaseConfig.messagingSenderId}]]*/ "",
				appId:             /*[[${firebaseConfig.appId}]]*/ ""
			};
			const vapidKey = /*[[${firebaseConfig.vapidKey}]]*/ "";
		</script>

		<script type="module">
			import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
			import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

			const app = initializeApp(firebaseConfig);
			const messaging = getMessaging(app);

			async function setupPushNotification() {
				// Cek support browser
				if (!('serviceWorker' in navigator) || !('Notification' in window)) {
					console.warn('Browser tidak mendukung push notification');
					return;
				}

				try {
					// Minta izin notifikasi
					const permission = await Notification.requestPermission();
					if (permission !== 'granted') {
						console.warn('Izin notifikasi ditolak oleh user');
						return;
					}

					// Register service worker
					const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
					console.log('Service Worker berhasil terdaftar');

					// Ambil FCM token
					const token = await getToken(messaging, {
						vapidKey: vapidKey,
						serviceWorkerRegistration: registration
					});

					if (token) {
						console.log('FCM Token didapat:', token);
						await saveToken(token);
					} else {
						console.warn('Gagal mendapat FCM token');
					}

				} catch (error) {
					console.error('Error setup push notification:', error);
				}
			}

			// Kirim token ke backend Spring Boot
			async function saveToken(token) {
				try {
					const response = await fetch('/api/notifications/register-token', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json'
						},
						body: JSON.stringify({ token })
					});

					if (response.ok) {
						console.log('Token berhasil disimpan');
					} else {
						console.error('Gagal simpan token, status:', response.status);
					}
				} catch (err) {
					console.error('Error kirim token ke backend:', err);
				}
			}

			// Handle notifikasi saat app sedang aktif (foreground)
			onMessage(messaging, (payload) => {
				console.log('Notifikasi foreground diterima:', payload);

				const title = payload.notification?.title || 'Notifikasi Baru';
				const body  = payload.notification?.body  || '';

				// Tampilkan native notification
				if (Notification.permission === 'granted') {
					new Notification(title, {
						body,
						icon: '/images/logo.png'
					});
				}
			});

			// Jalankan
			setupPushNotification();
		</script>
	</body>
</html>
