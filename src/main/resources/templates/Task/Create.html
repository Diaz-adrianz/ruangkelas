<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tambah Tugas Baru - RuangKelas</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-gray-100 min-h-screen font-sans p-6">

    <div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Tambah Tugas Baru</h2>
        
        <form th:action="@{/tasks/create}" th:object="${task}" method="POST" class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Pilih Kelas</label>
                <select name="classId" required 
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
                    <option value="">-- Pilih Kelas --</option>
                    <option th:each="c : ${classes}" th:value="${c.id}" th:text="${c.name}"></option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Judul Tugas</label>
                <input type="text" th:field="*{title}" required 
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" 
                       placeholder="Contoh: Proyek Alstruk">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Deskripsi</label>
                <textarea th:field="*{description}" rows="3" 
                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" 
                          placeholder="Jelaskan detail tugas di sini..."></textarea>
            </div>

            <div class="flex justify-end space-x-2 pt-2">
                <a th:href="@{/tasks}" class="bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400">Batal</a>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Simpan Tugas</button>
            </div>
        </form>
    </div>

</body>
</html>
