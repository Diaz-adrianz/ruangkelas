<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Notifikasi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { background-color: #009ca4; color: #ffffff; padding: 15px; border-radius: 8px 8px 0 0; text-align: center; }
        .content { padding: 20px; color: #333333; line-height: 1.6; }
        .button-container { text-align: center; margin-top: 20px; }
        .button { 
            display: inline-block; 
            padding: 12px 25px; 
            background-color: #009ca4; 
            color: #ffffff; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
        }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 th:text="${title}">Judul Notifikasi</h2>
        </div>
        <div class="content">
            <p th:text="${content}">Isi pesan notifikasi akan muncul di sini.</p>
            <div class="button-container">
                <a th:href="${redirectUrl}" class="button">Lihat Detail</a>
            </div>
        </div>
        <div class="footer">
            <p>Pesan ini dikirim otomatis oleh sistem RuangKelas.</p>
        </div>
    </div>
</body>
</html>
