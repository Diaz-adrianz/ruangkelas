<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 20px; border-radius: 8px; }
        .header { background-color: #4F46E5; color: #ffffff; padding: 10px 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .content { padding: 20px; color: #333333; line-height: 1.6; }
        .button { display: inline-block; padding: 10px 20px; margin-top: 20px; background-color: #4F46E5; color: #ffffff; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>{{TITLE}}</h2>
        </div>
        <div class="content">
            <p>{{CONTENT}}</p>
            <div style="text-align: center;">
                <a href="{{REDIRECT_URL}}" class="button">Lihat Detail</a>
            </div>
        </div>
    </div>
</body>
</html>
