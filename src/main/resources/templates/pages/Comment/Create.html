<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title>Tambah Komentar</title>
	</head>
	<body>
		<div layout:fragment="content" class="mx-auto max-w-5xl p-4">
			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li><a th:href="@{/class/{classCode}(classCode=${classs.classCode})}" th:text="${classs.name}"></a></li>
					<li><a th:href="@{/class/{classCode}(classCode=${classs.classCode})}">Tugas</a></li>
					<li>
						<a
							th:href="@{/class/{classCode}/tasks/{taskId}(classCode=${classCode}, taskId=${taskId})}"
							th:text="${task.title}"
						></a>
					</li>
					<li>
						<a th:href="@{/class/{classCode}/tasks/{taskId}#comments(classCode=${classCode}, taskId=${taskId})}">
							Komentar
						</a>
					</li>
					<li>Tambah</li>
				</ul>
			</div>

			<!-- ====== ALERTS ======  -->
			<!-- error -->
			<div th:if="${error}" class="alert alert-soft alert-error mb-4">
				<span th:text="${error}"></span>
			</div>
			<!-- ====== ALERTS ======  -->

			<h1 class="typo-heading-xl mb-4">Tambah Komentar</h1>

			<div class="card bg-base-100 border border-base-300">
				<div class="card-body">
					<form
						th:action="@{/class/{classCode}/tasks/{taskId}/comments(classCode=${classCode}, taskId=${taskId})}"
						th:object="${commentCreateDto}"
						method="post"
						class="flex flex-col"
					>
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

						<fieldset class="fieldset">
							<legend class="fieldset-legend">Komentar</legend>
							<textarea
								th:field="*{content}"
								class="textarea validator w-full"
								required
								type="text"
								placeholder="Tulis komentar kamu di sini..."
								minlength="1"
								maxlength="100"
							></textarea>
							<span class="validator-hint">1 - 100 karakter</span>
							<p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="text-error typo-caption"></p>
						</fieldset>

						<div class="flex justify-end gap-2 mt-4">
							<a
								th:href="@{/class/{classCode}/tasks/{taskId}(classCode=${classCode}, taskId=${taskId})}"
								class="btn btn-ghost"
							>
								Batal
							</a>
							<button type="submit" class="btn btn-primary">Kirim</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
