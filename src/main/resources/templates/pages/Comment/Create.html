<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title>Tambah Komentar</title>
	</head>
	<body>
		<div layout:fragment="content" class="mx-auto max-w-5xl p-4">
			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li><a th:href="@{/class/{classCode}(classCode=${classs.classCode})}" th:text="${classs.name}"></a></li>
					<li><a th:href="@{/class/{classCode}(classCode=${classs.classCode})}">Tugas</a></li>
					<li>
						<a
							th:href="@{/class/{classCode}/tasks/{taskId}(classCode=${classCode}, taskId=${taskId})}"
							th:text="${task.title}"
						></a>
					</li>
					<li>
						<a th:href="@{/class/{classCode}/tasks/{taskId}#comments(classCode=${classCode}, taskId=${taskId})}">
							Komentar
						</a>
					</li>
					<li th:if="${comment == null}">Tambah</li>
					<li th:if="${comment != null}">Balas</li>
				</ul>
			</div>

			<!-- ====== ALERTS ======  -->
			<!-- error -->
			<div th:if="${error}" class="alert alert-soft alert-error mb-4">
				<span th:text="${error}"></span>
			</div>
			<!-- ====== ALERTS ======  -->

			<h1 th:if="${comment == null}" class="typo-heading-xl mb-4">Tambah Komentar</h1>
			<h1 th:if="${comment != null}" class="typo-heading-xl mb-4">Balas Komentar</h1>

			<div th:if="${comment != null}" class="card bg-base-100 border border-base-300 mb-4">
				<div class="card-body p-4 flex-row items-start">
					<div class="size-10 rounded-full overflow-hidden relative">
						<img
							th:if="${comment.userClass.user.profilePicture != null}"
							th:src="${comment.userClass.user.profilePicture}"
							alt="Profile Picture"
							class="w-full h-full object-cover"
						/>
						<div
							th:unless="${comment.userClass.user.profilePicture != null}"
							class="bg-neutral text-neutral-content size-full rounded-full flex items-center justify-center"
						>
							<span th:text="${comment.userClass.user.getInitials()}"></span>
						</div>
					</div>

					<div class="flex-1">
						<div class="flex items-center flex-wrap gap-2">
							<span class="typo-body-md">
								<span th:text="${comment.userClass.user.name}"></span>
							</span>
							<div th:if="${comment.userClass.role.name() == 'ADMIN'}" class="badge badge-xs badge-primary">Admin</div>
							<span
								class="typo-caption text-base-content/60"
								th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy HH:mm')}"
							>
								Waktu
							</span>
						</div>
						<p class="typo-body-md text-base-content/60" th:text="${comment.content}">Isi komentar.</p>
					</div>
				</div>
			</div>

			<div class="card bg-base-100 border border-base-300">
				<div class="card-body">
					<form
						th:action="@{/class/{classCode}/tasks/{taskId}/comments(classCode=${classCode}, taskId=${taskId})}"
						th:object="${commentCreateDto}"
						method="post"
						class="flex flex-col"
					>
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<input type="hidden" name="parentId" th:value="${comment != null ? comment.id : ''}" />

						<fieldset class="fieldset">
							<legend class="fieldset-legend">Komentar</legend>
							<textarea
								th:field="*{content}"
								class="textarea validator w-full"
								required
								type="text"
								placeholder="Tulis komentar kamu di sini..."
								minlength="1"
								maxlength="100"
							></textarea>
							<span class="validator-hint">1 - 100 karakter</span>
							<p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="text-error typo-caption"></p>
						</fieldset>

						<div class="flex justify-end gap-2 mt-4">
							<a
								th:href="@{/class/{classCode}/tasks/{taskId}(classCode=${classCode}, taskId=${taskId})}"
								class="btn btn-ghost"
							>
								Batal
							</a>
							<button type="submit" class="btn btn-primary">Kirim</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
