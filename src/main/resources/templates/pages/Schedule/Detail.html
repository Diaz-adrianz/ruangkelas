<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/Home}"
>
  <head>
    <title th:text="${#temporals.format(schedule.startTime, 'EEEE, dd MMM yyyy')}">Detail Jadwal</title>
  </head>

  <body>
    <div layout:fragment="content" class="mx-auto max-w-5xl p-4">
      <!-- breadcrumb -->
      <div class="breadcrumbs text-sm mb-4">
        <ul>
          <li><a href="/">Beranda</a></li>
          <li>
            <a th:href="@{/class/{classCode}(classCode=${classs.classCode})}" th:text="${classs.name}"></a>
          </li>
          <li>
            <a th:href="@{/class/{classCode}#schedules(classCode=${classs.classCode})}">Jadwal</a>
          </li>
          <li th:text="${#temporals.format(schedule.startTime, 'EEEE, dd MMM yyyy')}"></li>
        </ul>
      </div>

      <!-- success / error -->
      <div th:if="${success}" class="alert alert-soft alert-success mb-4">
        <span th:text="${success}"></span>
      </div>

      <div th:if="${error}" class="alert alert-soft alert-error mb-4">
        <span th:text="${error}"></span>
      </div>

      <!-- header -->
      <div class="flex items-center justify-between flex-wrap gap-4 mb-4">
        <h1
          class="typo-heading-xl"
          th:text="${#temporals.format(schedule.startTime, 'EEEE, dd MMM yyyy')}"
        ></h1>

        <div class="dropdown dropdown-end" th:if="${isAdmin}">
          <div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
            <i class="ri-more-2-line text-sm"></i>
          </div>

          <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-48 mt-2 z-10">
            <li>
              <a th:href="@{/class/{classCode}/schedule/edit/{scheduleId}(classCode=${classs.classCode}, scheduleId=${schedule.id})}">
                Edit Jadwal
              </a>
            </li>

            <li>
              <form
                th:action="@{/class/{classCode}/schedule/delete/{scheduleId}(classCode=${classs.classCode}, scheduleId=${schedule.id})}"
                method="post"
              >
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button
                  type="submit"
                  class="text-error w-full text-left"
                  onclick="return confirm('Yakin hapus jadwal ini?');"
                >
                  Hapus Jadwal
                </button>
              </form>
            </li>
          </ul>
        </div>
      </div>

      <!-- info -->
      <div class="flex flex-col gap-2">
        <div class="flex gap-2 items-center">
          <i class="ri-graduation-cap-line opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Kelas</p>
          <p class="typo-body-md" th:text="${classs.name}"></p>
        </div>

        <div class="flex gap-2 items-center">
          <i class="ri-file-marked-line opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Mata Kuliah</p>
          <p class="typo-body-md" th:text="${classs.course.name}"></p>
        </div>

        <div class="flex gap-2 items-center">
          <i class="ri-time-line opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Jam</p>
          <p
            class="typo-body-md"
            th:text="${#temporals.format(schedule.startTime, 'HH.mm')} + ' - ' + ${#temporals.format(schedule.endTime, 'HH.mm')}"
          ></p>
        </div>

        <div class="flex gap-2 items-center">
          <i class="ri-map-pin-line opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Lokasi</p>
          <p class="typo-body-md" th:text="${schedule.place}"></p>
        </div>
      </div>
    </div>
  </body>
</html>
