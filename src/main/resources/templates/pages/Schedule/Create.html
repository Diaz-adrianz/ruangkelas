<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layouts/Home}"
>
  <head>
    <title>Tambah Jadwal</title>
  </head>

  <body>
    <div layout:fragment="content" class="mx-auto max-w-xl p-4">
      <!-- breadcrumb -->
      <div class="breadcrumbs text-sm mb-4">
        <ul>
          <li><a href="/">Beranda</a></li>
          <li>
            <a th:href="@{/class/{classCode}(classCode=${classs.classCode})}" th:text="${classs.name}"></a>
          </li>
          <li>
            <a th:href="@{/class/{classCode}/schedule(classCode=${classs.classCode})}">Jadwal</a>
          </li>
          <li>Tambah</li>
        </ul>
      </div>

      <h1 class="typo-heading-xl mb-6" th:text="'Tambah Jadwal ' + ${classs.name}"></h1>

      <div th:if="${error}" class="alert alert-soft alert-error mb-4">
        <span th:text="${error}"></span>
      </div>

      <form
        th:action="@{/class/{classCode}/schedule/create(classCode=${classs.classCode})}"
        th:object="${createScheduleDto}"
        method="post"
        class="flex flex-col gap-4"
      >
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label class="form-control">
          <span class="label">Jam mulai</span>
          <input
            type="datetime-local"
            th:field="*{startTime}"
            class="input input-bordered w-full"
          />
          <span
            th:if="${#fields.hasErrors('startTime')}"
            th:errors="*{startTime}"
            class="text-error text-sm mt-1"
          ></span>
        </label>

        <label class="form-control">
          <span class="label">Jam selesai</span>
          <input
            type="datetime-local"
            th:field="*{endTime}"
            class="input input-bordered w-full"
          />
          <span
            th:if="${#fields.hasErrors('endTime')}"
            th:errors="*{endTime}"
            class="text-error text-sm mt-1"
          ></span>
        </label>

        <label class="form-control">
          <span class="label">Lokasi</span>
          <input
            type="text"
            th:field="*{place}"
            placeholder="Contoh: FSTR 4.10"
            class="input input-bordered w-full"
          />
          <span
            th:if="${#fields.hasErrors('place')}"
            th:errors="*{place}"
            class="text-error text-sm mt-1"
          ></span>
        </label>

        <div class="flex justify-end gap-2 mt-2">
          <a
            th:href="@{/class/{classCode}/schedule(classCode=${classs.classCode})}"
            class="btn btn-ghost"
          >
            Batal
          </a>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </body>
</html>
