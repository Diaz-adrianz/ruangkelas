<!doctype html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/Auth}">
	<head>
		<title>Lupa Password</title>
	</head>
	<body>
		<div layout:fragment="content" class="card w-full shadow max-w-sm bg-base-100">
			<div class="card-body gap-4">
				<div class="text-center">
					<h1 class="text-2xl font-bold">Lupa Password</h1>
					<p class="text-base-content/60 text-sm mt-1">Masukkan email kamu untuk menerima kode OTP reset password</p>
				</div>

				<!-- ====== ALERTS ======  -->
				<!-- success  -->
				<div th:if="${success}" class="alert alert-soft alert-success">
					<span th:text="${success}"></span>
				</div>

				<!-- error -->
				<div th:if="${error}" class="alert alert-soft alert-error">
					<span th:text="${error}"></span>
				</div>

				<div th:if="${errors}" class="alert alert-warning alert-soft">
					<div>
						<h3 class="font-bold">Validasi gagal.</h3>
						<ul class="list-disc ps-4">
							<li th:each="err : ${errors}" th:text="${err.defaultMessage}"></li>
						</ul>
					</div>
				</div>
				<!-- ====== ALERTS ======  -->

				<form method="post" th:action="@{/auth/forgot-password}" th:object="${forgotPasswordDto}" class="flex flex-col">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

					<fieldset class="fieldset">
						<legend class="fieldset-legend">Email</legend>
						<input
							th:field="*{email}"
							class="input validator w-full"
							required
							type="email"
							name="email"
							placeholder="johndoe@example.com"
						/>
						<span class="validator-hint">Masukkan email yang valid</span>
					</fieldset>

					<button type="submit" class="btn btn-primary w-full mt-4">Kirim</button>
				</form>
			</div>
		</div>
	</body>
</html>
