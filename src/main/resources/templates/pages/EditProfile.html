<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title>Edit Profil</title>
	</head>

	<body>
		<div layout:fragment="content" class="max-w-5xl mx-auto p-4">
			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li><a href="/profile">Profil</a></li>
					<li>Edit</li>
				</ul>
			</div>

			<div class="flex items-center justify-between mb-4">
				<h1 class="typo-heading-xl">Edit Profil</h1>
			</div>

			<!-- ALERT -->
			<div th:if="${error}" class="alert alert-soft alert-error mb-4">
				<span th:text="${error}"></span>
			</div>

			<div th:if="${errors}" class="alert alert-warning alert-soft mb-4">
				<div>
					<h3 class="font-bold">Validasi gagal.</h3>
					<ul class="list-disc ps-4">
						<li th:each="err : ${errors}" th:text="${err.defaultMessage}"></li>
					</ul>
				</div>
			</div>

			<form
				th:action="@{/profile/edit}"
				th:object="${updateProfileDto}"
				method="post"
				enctype="multipart/form-data"
				class="flex flex-col"
			>

				<input
					type="hidden"
					th:name="${_csrf.parameterName}"
					th:value="${_csrf.token}"
				/>

				<fieldset class="fieldset">
					<legend class="fieldset-legend">
						Nama Lengkap
					</legend>

					<input
						th:field="*{name}"
						class="input validator w-full"
						required
						type="text"
						name="name"
						placeholder="Nama Lengkap"
						pattern="^[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ' .]{2,49}$"
					/>

					<span class="validator-hint">
						3 - 50 karakter, hanya huruf, spasi, titik, dan apostrof
					</span>
				</fieldset>

				<fieldset class="fieldset">
					<legend class="fieldset-legend">
						NIM
					</legend>

					<input
						th:field="*{nim}"
						class="input validator w-full"
						type="text"
						name="nim"
						placeholder="124705xxxx"
						pattern="^\d{10}$"
					/>

					<span class="label">
						Optional
					</span>

					<span class="validator-hint">
						10 karakter angka
					</span>
				</fieldset>

				<!-- FOTO PROFIL -->
				<fieldset class="fieldset">
					<legend class="fieldset-legend">
						Foto Profil
					</legend>

					<input
						type="file"
						name="photo"
						accept=".jpg,.jpeg,.png"
						class="file-input file-input-bordered w-full"
					/>

					<span class="label">
						Format: JPG, JPEG, PNG
					</span>
				</fieldset>

				<div class="flex gap-2 mt-4">
					<button
						type="submit"
						class="btn btn-primary"
					>
						Simpan
					</button>

					<a
						href="/profile"
						class="btn btn-outline"
					>
						Batal
					</a>
				</div>

			</form>
		</div>
	</body>
</html>
