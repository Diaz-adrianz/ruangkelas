<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title>Edit Profil</title>
	</head>

	<body>
		<div layout:fragment="content" class="max-w-5xl mx-auto p-4">
			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li><a href="/profil">Profil</a></li>
					<li>Edit</li>
				</ul>
			</div>

			<div class="flex items-center justify-between mb-4">
				<h1 class="typo-heading-xl">Edit Profil</h1>
			</div>

			<form th:action="@{/profil/edit}" method="post" class="flex flex-col">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

				<fieldset class="fieldset">
					<legend class="fieldset-legend">Nama lengkap</legend>
					<input
						th:field="${user.name}"
						class="input validator w-full"
						required
						type="text"
						name="name"
						placeholder="johndoe19"
						pattern="^[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ' .]{2,49}$"
					/>
					<span class="validator-hint">3 - 50 karakter, hanya huruf, spasi, titik, dan apostrof</span>
				</fieldset>

				<fieldset class="fieldset">
					<legend class="fieldset-legend">NIM</legend>
					<input
						th:field="${user.nim}"
						class="input validator w-full"
						type="text"
						name="nim"
						placeholder="124705••••"
						pattern="^\d{10}$"
					/>
					<span class="label">Optional</span>
					<span class="validator-hint">10 karakter.</span>
				</fieldset>

				<div class="flex gap-2 mt-4">
					<button type="submit" class="btn btn-primary">Simpan</button>

					<a href="/profil" class="btn btn-outline">Batal</a>
				</div>
			</form>
		</div>
	</body>
</html>
