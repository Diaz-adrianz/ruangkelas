<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/Home}"
>
    <head>
        <title>Tambah Komentar</title>
    </head>
    <body>
        <div layout:fragment="content" class="mx-auto max-w-5xl p-4">
            <div class="breadcrumbs text-sm mb-4">
                <ul>
                    <li><a href="/">Beranda</a></li>
                    <li><a th:href="@{/class/{classCode}(classCode=${classCode})}">Kelas</a></li>
                    <li><a th:href="@{/class/{classCode}/tasks/{taskId}(classCode=${classCode}, taskId=${taskId})}">Detail Tugas</a></li>
                    <li>Tambah Komentar</li>
                </ul>
            </div>

            <h1 class="typo-heading-xl mb-4">Tambah Komentar</h1>

            <div class="card bg-base-100 border border-base-300">
                <div class="card-body p-4">
                    <form th:action="@{/class/{classCode}/tasks/{taskId}/comments(classCode=${classCode}, taskId=${taskId})}" 
                          th:object="${commentCreateDto}"
                          method="post" class="flex flex-col gap-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        
                        <div>
                            <textarea th:field="*{content}" 
                                      class="textarea textarea-bordered w-full h-32 resize-none" 
                                      placeholder="Tulis komentar kamu di sini..." 
                                      required></textarea>
                            <p th:if="${#fields.hasErrors('content')}" 
                               th:errors="*{content}" 
                               class="text-error text-sm mt-1"></p>
                        </div>

                        <div class="flex justify-end gap-2">
                            <a th:href="@{/class/{classCode}/tasks/{taskId}(classCode=${classCode}, taskId=${taskId})}" class="btn btn-ghost btn-sm">Batal</a>
                            <button type="submit" class="btn btn-primary btn-sm px-4">Kirim</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
