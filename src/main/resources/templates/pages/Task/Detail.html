<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="~{layouts/Home}"
>
    <head>
        <title th:text="${task.title}">Detail Tugas</title>
    </head>
    <body>
        <div layout:fragment="content" class="mx-auto max-w-5xl p-4">
            <div class="breadcrumbs text-sm mb-4">
                <ul>
                    <li><a href="/">Beranda</a></li>
                    <li><a th:href="@{/class/{classCode}(classCode=${classs.classCode})}" th:text="${classs.name}"></a></li>
                    <li><a th:href="@{/class/{classCode}(classCode=${classs.classCode})}">Tugas</a></li>
                    <li th:text="${task.title}"></li>
                </ul>
            </div>

            <div th:if="${success}" class="alert alert-soft alert-success mb-4">
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="alert alert-soft alert-error mb-4">
                <span th:text="${error}"></span>
            </div>
            <div class="flex items-center flex-wrap gap-4 mb-4">
                <h1 class="typo-heading-xl grow" th:text="${task.title}"></h1>
                <div th:if="${task.daysUntilDeadline >= 4 and task.daysUntilDeadline <= 7}" class="badge badge-info ps-2">
                    <i class="ri-timer-line"></i>
                    <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                </div>
                <div th:if="${task.daysUntilDeadline >= 2 and task.daysUntilDeadline <= 3}" class="badge badge-warning ps-2">
                    <i class="ri-timer-line"></i>
                    <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                </div>
                <div th:if="${task.daysUntilDeadline >= 0 and task.daysUntilDeadline <= 1}" class="badge badge-error ps-2">
                    <i class="ri-timer-line"></i>
                    <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                </div>
                <div th:if="${isAdmin}" class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
                        <i class="ri-more-2-line text-sm"></i>
                    </div>
                    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-48 mt-2 z-10">
                        <li>
                            <a th:href="@{/class/{classCode}/tasks/{taskId}/edit(classCode=${classs.classCode}, taskId=${task.id})}">
                                Edit tugas
                            </a>
                        </li>
                        <li>
                            <form
                                th:action="@{/class/{classCode}/tasks/{taskId}/delete(classCode=${classs.classCode}, taskId=${task.id})}"
                                method="post"
                            >
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button
                                    type="submit"
                                    class="text-error w-full text-left"
                                    onclick="return confirm('Yakin hapus tugas ini?');"
                                >
                                    Hapus tugas
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <div class="flex gap-2 items-center">
                    <i class="ri-hashtag opacity-60"></i>
                    <p class="typo-body-md w-1/3 max-w-40 opacity-60">Kelas</p>
                    <a
                        class="typo-body-md link"
                        th:href="@{/class/{classCode}(classCode=${classs.classCode})}"
                        th:text="${classs.name}"
                    ></a>
                </div>
                <div class="flex gap-2 items-center">
                    <i class="ri-file-marked-line opacity-60"></i>
                    <p class="typo-body-md w-1/3 max-w-40 opacity-60">Mata kuliah</p>
                    <p class="typo-body-md" th:text="${classs.course.name}"></p>
                </div>
                <div class="flex gap-2 items-center">
                    <i class="ri-timer-line opacity-60"></i>
                    <p class="typo-body-md w-1/3 max-w-40 opacity-60">Batas waktu</p>
                    <p class="typo-body-md" th:text="${#temporals.format(task.deadline, 'EEEE, dd MMM yyyy HH:mm')}"></p>
                </div>
            </div>

            <div th:if="${task.description}" class="card mt-4 bg-base-100 border border-base-300">
                <div class="card-body p-4">
                    <p class="typo-body-md text-base-content/60" th:text="${task.description}"></p>
                </div>
            </div>

            <div class="mt-8 tabs tabs-border">
                <label class="tab has-[input:checked]:text-primary gap-4">
                    <input type="radio" name="tabs" checked />
                    Sub tugas
                    <div>0</div>
                </label>
                <div class="tab-content pt-4">List sub tugas</div>

                <label class="tab has-[input:checked]:text-primary gap-4">
                    <input type="radio" name="tabs" />
                    Komentar
                    <div th:text="${comments != null ? #lists.size(comments) : 0}">0</div>
                </label>
                <div class="tab-content pt-4">
                    <div class="w-full">
                        
                        <div class="mb-4">
                            <a th:href="@{/class/{classCode}/tasks/{taskId}/comments/new(classCode=${classs.classCode}, taskId=${task.id})}" class="btn btn-primary btn-sm px-4">
                                <i class="ri-add-line"></i>
                                Tambah Komentar
                            </a>
                        </div>

                        <div th:if="${comments != null and !#lists.isEmpty(comments)}" class="flex flex-col gap-3">
                            <div th:each="comment : ${comments}" class="card bg-base-100 border border-base-200 shadow-sm">
                                <div class="card-body p-4">
                                    <div class="flex flex-row gap-3 items-start">
                                        <div class="avatar placeholder">
                                            <div class="bg-neutral text-neutral-content rounded-full w-8 h-8">
                                                <span class="text-xs" th:text="${#strings.substring(comment.userClass.user.name, 0, 1)}">U</span>
                                            </div>
                                        </div>
                                        <div class="flex-1">
                                            <div class="flex items-center gap-2 mb-1">
                                                <span class="font-semibold text-sm" th:text="${comment.userClass.user.name}">Nama User</span>
                                                <span th:if="${comment.userClass.role.name() == 'ADMIN'}" class="badge badge-xs badge-primary">Admin</span>
                                                <span class="text-xs opacity-50" th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy HH:mm')}">Waktu</span>
                                            </div>
                                            <p class="text-sm text-base-content/80" th:text="${comment.content}">Isi komentar.</p>
                                        </div>
                                        <form th:if="${isAdmin or comment.userClass.user.id == currentUserId}"
                                              th:action="@{/class/{classCode}/tasks/{taskId}/comments/{commentId}/delete(classCode=${classs.classCode}, taskId=${task.id}, commentId=${comment.id})}"
                                              method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <button type="submit" class="btn btn-ghost btn-xs text-error" onclick="return confirm('Hapus komentar ini?');">
                                                <i class="ri-delete-bin-line"></i>
                                            </button>
                                        </form>
                                    </div>

                                    <!-- Replies -->
                                    <div th:if="${comment.replies != null and !#lists.isEmpty(comment.replies)}" class="ml-11 mt-3 flex flex-col gap-2">
                                        <div th:each="reply : ${comment.replies}" class="flex flex-row gap-3 items-start border-l-2 border-base-300 pl-3">
                                            <div class="avatar placeholder">
                                                <div class="bg-primary text-primary-content rounded-full w-7 h-7">
                                                    <span class="text-xs" th:text="${#strings.substring(reply.userClass.user.name, 0, 1)}">A</span>
                                                </div>
                                            </div>
                                            <div class="flex-1">
                                                <div class="flex items-center gap-2 mb-1">
                                                    <span class="font-semibold text-sm" th:text="${reply.userClass.user.name}">Admin</span>
                                                    <span th:if="${reply.userClass.role.name() == 'ADMIN'}" class="badge badge-xs badge-primary">Admin</span>
                                                    <span class="text-xs opacity-50" th:text="${#temporals.format(reply.createdAt, 'dd MMM yyyy HH:mm')}">Waktu</span>
                                                </div>
                                                <p class="text-sm text-base-content/80" th:text="${reply.content}">Isi balasan.</p>
                                            </div>
                                            <form th:if="${isAdmin or reply.userClass.user.id == currentUserId}"
                                                  th:action="@{/class/{classCode}/tasks/{taskId}/comments/{commentId}/delete(classCode=${classs.classCode}, taskId=${task.id}, commentId=${reply.id})}"
                                                  method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                                <button type="submit" class="btn btn-ghost btn-xs text-error" onclick="return confirm('Hapus balasan ini?');">
                                                    <i class="ri-delete-bin-line"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>

                                    <!-- Reply form (Admin only) -->
                                    <div th:if="${isAdmin}" class="ml-11 mt-3">
                                        <form th:action="@{/class/{classCode}/tasks/{taskId}/comments/{commentId}/reply(classCode=${classs.classCode}, taskId=${task.id}, commentId=${comment.id})}"
                                              method="post" class="flex gap-2 items-start">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                            <textarea name="content" class="textarea textarea-bordered textarea-sm w-full h-12 resize-none" placeholder="Balas komentar..." required></textarea>
                                            <button type="submit" class="btn btn-primary btn-sm">Balas</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div th:if="${comments == null or #lists.isEmpty(comments)}" class="text-center py-8 text-base-content/40 border border-dashed border-base-300 rounded-box bg-base-100/50 text-sm">
                            Belum ada komentar
                        </div>
                    </div>
                    </div>

                <label class="tab has-[input:checked]:text-primary gap-4">
                    <input type="radio" name="tabs" />
                    Submit
                    <div>0</div>
                </label>
                <div class="tab-content pt-4">List submit</div>
            </div>
        </div>
    </body>
</html>
