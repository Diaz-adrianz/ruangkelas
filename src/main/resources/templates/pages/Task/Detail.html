<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title th:text="${task.title}">Detail Tugas</title>
	</head>
	<body>
		<div layout:fragment="content" class="mx-auto max-w-5xl p-4">
			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li><a th:href="@{/class/{classCode}(classCode=${classs.classCode})}" th:text="${classs.name}"></a></li>
					<li><a th:href="@{/class/{classCode}(classCode=${classs.classCode})}">Tugas</a></li>
					<li th:text="${task.title}"></li>
				</ul>
			</div>

			<!-- ====== ALERTS ======  -->
			<div th:if="${success}" class="alert alert-soft alert-success mb-4">
				<span th:text="${success}"></span>
			</div>

			<div th:if="${error}" class="alert alert-soft alert-error mb-4">
				<span th:text="${error}"></span>
			</div>
			<!-- ====== ALERTS ======  -->

			<div class="flex items-center flex-wrap gap-4 mb-4">
				<h1 class="typo-heading-xl grow" th:text="${task.title}"></h1>
				<div th:if="${task.daysUntilDeadline >= 4 and task.daysUntilDeadline <= 7}" class="badge badge-info ps-2">
					<i class="ri-timer-line"></i>
					<span th:text="'H-' + ${task.daysUntilDeadline}"></span>
				</div>
				<div th:if="${task.daysUntilDeadline >= 2 and task.daysUntilDeadline <= 3}" class="badge badge-warning ps-2">
					<i class="ri-timer-line"></i>
					<span th:text="'H-' + ${task.daysUntilDeadline}"></span>
				</div>
				<div th:if="${task.daysUntilDeadline >= 0 and task.daysUntilDeadline <= 1}" class="badge badge-error ps-2">
					<i class="ri-timer-line"></i>
					<span th:text="'H-' + ${task.daysUntilDeadline}"></span>
				</div>
				<div th:if="${isAdmin}" class="dropdown dropdown-end">
					<div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
						<i class="ri-more-2-line text-sm"></i>
					</div>
					<ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-48 mt-2 z-10">
						<li>
							<a th:href="@{/class/{classCode}/tasks/{taskId}/edit(classCode=${classs.classCode}, taskId=${task.id})}">
								Edit tugas
							</a>
						</li>
						<li>
							<form
								th:action="@{/class/{classCode}/tasks/{taskId}/delete(classCode=${classs.classCode}, taskId=${task.id})}"
								method="post"
							>
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
								<button
									type="submit"
									class="text-error w-full text-left"
									onclick="return confirm('Yakin hapus tugas ini?');"
								>
									Hapus tugas
								</button>
							</form>
						</li>
					</ul>
				</div>
			</div>

			<div class="flex flex-col gap-2">
				<div class="flex gap-2 items-center">
					<i class="ri-hashtag opacity-60"></i>
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Kelas</p>
					<a
						class="typo-body-md link"
						th:href="@{/class/{classCode}(classCode=${classs.classCode})}"
						th:text="${classs.name}"
					></a>
				</div>
				<div class="flex gap-2 items-center">
					<i class="ri-file-marked-line opacity-60"></i>
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Mata kuliah</p>
					<p class="typo-body-md" th:text="${classs.course.name}"></p>
				</div>
				<div class="flex gap-2 items-center">
					<i class="ri-timer-line opacity-60"></i>
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Batas waktu</p>
					<p class="typo-body-md" th:text="${#temporals.format(task.deadline, 'EEEE, dd MMM yyyy HH:mm')}"></p>
				</div>
			</div>

			<div th:if="${task.description}" class="card mt-4 bg-base-100 border border-base-300">
				<div class="card-body p-4">
					<p class="typo-body-md text-base-content/60" th:text="${task.description}"></p>
				</div>
			</div>

			<div class="mt-8 tabs tabs-border">
				<label class="tab has-[input:checked]:text-primary gap-4">
					<input type="radio" name="tabs" checked />
					Sub tugas
					<div th:text="${subtasks != null ? #lists.size(subtasks) : 0}">0</div>
				</label>
				<div class="tab-content pt-4">
					<div th:if="${isAdmin}" class="flex justify-end mb-4">
						<a
							th:href="@{/class/{classCode}/tasks/{taskId}/subtasks/create(classCode=${classs.classCode}, taskId=${task.id})}"
							class="btn btn-primary btn-sm"
						>
							<i class="ri-add-large-line"></i>
							Tambah Sub Tugas
						</a>
					</div>

					<div th:if="${#lists.isEmpty(subtasks)}" class="text-center py-12 text-base-content/60 typo-body-md">
						Belum ada sub tugas
					</div>

					<div th:if="${!#lists.isEmpty(subtasks)}" class="flex flex-col gap-2">
						<div th:each="subtask : ${subtasks}" class="card bg-base-100 border border-base-300 group">
							<div class="card-body p-4 flex-row items-center gap-4">
								<div class="flex-1">
									<h3
										role="button"
										class="typo-body-md cursor-pointer group-hover:underline"
										th:text="${subtask.title}"
									></h3>
									<p
										class="typo-caption text-base-content/60"
										th:text="'Batas waktu ' + ${#temporals.format(subtask.deadline, 'EEEE, dd MMM yyyy HH:mm')}"
									></p>
								</div>

								<span
									th:if="${subtask.daysUntilDeadline >= 4 and subtask.daysUntilDeadline <= 7}"
									class="badge badge-info ps-2"
								>
									<i class="ri-timer-line"></i>
									<span th:text="'H-' + ${subtask.daysUntilDeadline}"></span>
								</span>

								<span
									th:if="${subtask.daysUntilDeadline >= 2 and subtask.daysUntilDeadline <= 3}"
									class="badge badge-warning ps-2"
								>
									<i class="ri-timer-line"></i>
									<span th:text="'H-' + ${subtask.daysUntilDeadline}"></span>
								</span>

								<span
									th:if="${subtask.daysUntilDeadline >= 0 and subtask.daysUntilDeadline <= 1}"
									class="badge badge-error ps-2"
								>
									<i class="ri-timer-line"></i>
									<span th:text="'H-' + ${subtask.daysUntilDeadline}"></span>
								</span>

								<div th:if="${isAdmin}" class="dropdown dropdown-end">
									<div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
										<i class="ri-more-2-line text-sm"></i>
									</div>
									<ul
										tabindex="0"
										class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-44 mt-2 z-10 shadow-md"
									>
										<li>
											<a
												th:href="@{/class/{classCode}/tasks/{taskId}/subtasks/{id}/edit(classCode=${classs.classCode}, taskId=${task.id}, id=${subtask.id})}"
											>
												Edit
											</a>
										</li>
										<li>
											<form
												th:action="@{/class/{classCode}/tasks/{taskId}/subtasks/{id}/delete(classCode=${classs.classCode}, taskId=${task.id}, id=${subtask.id})}"
												method="post"
												onsubmit="return confirm('Yakin ingin menghapus sub tugas ini?');"
											>
												<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

												<button type="submit" class="text-error">Hapus</button>
											</form>
										</li>
									</ul>
								</div>
							</div>
						</div>
					</div>
				</div>

				<label class="tab has-[input:checked]:text-primary gap-4">
					<input type="radio" name="tabs" />
					Komentar
					<div>0</div>
				</label>
				<div class="tab-content pt-4">List komentar</div>

				<label class="tab has-[input:checked]:text-primary gap-4">
					<input type="radio" name="tabs" />
					Submit
					<div>0</div>
				</label>
				<div class="tab-content pt-4">List submit</div>
			</div>
		</div>
	</body>
</html>
