<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Tugas Baru</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-lg">
        <h2 class="text-2xl font-bold mb-2 text-gray-900">Buat Tugas Baru</h2>
        <p class="text-sm text-gray-500 mb-6" th:text="'Kelas: ' + ${classs.name}"></p>

        <form th:action="@{/class/{classId}/tasks/create(classId=${classs.id})}" th:object="${taskDto}" method="POST" class="space-y-4">
            
            <div>
                <label class="block text-sm font-semibold mb-1">Judul Tugas</label>
                <input type="text" th:field="*{title}" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" required placeholder="Contoh: Tugas Pertemuan 3 - OOP Java"/>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Deskripsi Tugas</label>
                <textarea th:field="*{description}" rows="4" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" placeholder="Tuliskan instruksi pengerjaan..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold mb-1">Batas Waktu (Deadline)</label>
                <input type="datetime-local" th:field="*{deadline}" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" required />
            </div>

            <div class="flex justify-end gap-3 pt-2">
                <a th:href="@{/class/{id}(id=${classs.id})}" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm font-medium transition">Batal</a>
                <button type="submit" class="px-5 py-2 bg-teal-600 text-white rounded-lg text-sm font-medium hover:bg-teal-700 transition shadow">Buat Tugas</button>
            </div>
        </form>
    </div>

</body>
</html>
