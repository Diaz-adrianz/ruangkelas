<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/Home}"
>

<head>
    <title>SubTask</title>
</head>

<body>

<div layout:fragment="content" class="mx-auto max-w-5xl p-4">

    <!-- Breadcrumb -->
    <div class="breadcrumbs text-sm mb-5">
        <ul>

            <li>
                <a href="/">
                    Beranda
                </a>
            </li>

            <li>
                <a
                    th:href="@{/class/{classCode}(classCode=${classs.classCode})}"
                    th:text="${classs.name}">
                </a>
            </li>

            <li>
                <a
                    th:href="@{/class/{classCode}/tasks/{taskId}
                    (classCode=${classs.classCode},
                    taskId=${task.id})}"
                    th:text="${task.title}">
                </a>
            </li>

            <li>SubTask</li>

        </ul>
    </div>

    <!-- Header -->

    <div class="flex justify-between items-center mb-6">

        <div>

            <h1 class="text-3xl font-bold">
                Daftar SubTask
            </h1>

            <p class="text-base-content/60">

                Semua SubTask untuk tugas ini

            </p>

        </div>

        <a
            th:href="@{/class/{classCode}/tasks/{taskId}/subtasks/create(
                    classCode=${classs.classCode},
                    taskId=${task.id})}"
            class="btn btn-primary">

            <i class="ri-add-line"></i>

            Tambah SubTask

        </a>

    </div>



    <!-- Empty -->

    <div
        th:if="${#lists.isEmpty(subtasks)}"
        class="card bg-base-100 border border-dashed">

        <div class="card-body items-center py-12">

            <i class="ri-file-list-3-line text-6xl opacity-40"></i>

            <h2 class="font-semibold text-xl">

                Belum ada SubTask

            </h2>

            <p class="opacity-60">

                Tambahkan SubTask pertama.

            </p>

        </div>

    </div>



    <!-- List -->

    <div
        th:unless="${#lists.isEmpty(subtasks)}"
        class="space-y-4">

        <div
            th:each="subtask : ${subtasks}"
            class="card bg-base-100 border border-base-300">

            <div class="card-body">

                <div class="flex justify-between">

                    <div>

                        <h2
                            class="card-title"
                            th:text="${subtask.title}">
                        </h2>

                        <p
                            class="mt-2 opacity-70"
                            th:text="${subtask.description}">
                        </p>

                        <div class="mt-4 flex gap-6 text-sm opacity-70">

                            <span>

                                Deadline :

                                <span
                                    th:text="${#temporals.format(subtask.deadline,'dd MMM yyyy HH:mm')}">
                                </span>

                            </span>

                        </div>

                    </div>



                    <div class="flex gap-2">

                        <a
                            th:href="@{/class/{classCode}/tasks/{taskId}/subtasks/{id}/edit(
                                classCode=${classs.classCode},
                                taskId=${task.id},
                                id=${subtask.id})}"
                            class="btn btn-warning btn-sm">

                            <i class="ri-pencil-line"></i>

                        </a>

                        <form
                            th:action="@{/class/{classCode}/tasks/{taskId}/subtasks/{id}/delete(
                                classCode=${classs.classCode},
                                taskId=${task.id},
                                id=${subtask.id})}"
                            method="post">

                            <input
                                type="hidden"
                                th:name="${_csrf.parameterName}"
                                th:value="${_csrf.token}" />

                            <button
                                class="btn btn-error btn-sm"
                                onclick="return confirm('Hapus SubTask?')">

                                <i class="ri-delete-bin-line"></i>

                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
