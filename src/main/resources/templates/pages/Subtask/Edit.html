<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/Home}"
>
<head>
    <title>Edit SubTask</title>
</head>

<body>
<div layout:fragment="content" class="mx-auto max-w-5xl p-4">

    <div class="breadcrumbs text-sm mb-4">
        <ul>

            <li><a href="/">Beranda</a></li>

            <li>
                <a
                    th:href="@{/class/{classCode}
                    (classCode=${classs.classCode})}"
                    th:text="${classs.name}">
                </a>
            </li>

            <li>
                <a
                    th:href="@{/class/{classCode}/tasks/{taskId}
                    (classCode=${classs.classCode},
                    taskId=${task.id})}"
                    th:text="${task.title}">
                </a>
            </li>

            <li>Edit SubTask</li>

        </ul>
    </div>

    <h1 class="typo-heading-xl mb-4">
        Edit SubTask
    </h1>

    <div class="card bg-base-100 border border-base-300">
        <div class="card-body">

            <form
                th:action="@{/class/{classCode}/tasks/{taskId}/subtasks/{subTaskId}/edit(
                    classCode=${classs.classCode},
                    taskId=${task.id},
                    subTaskId=${subTask.id})}"
                th:object="${updateSubTaskDto}"
                method="post"
                class="flex flex-col"
            >

                <input
                    type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}" />

                <fieldset class="fieldset">
                    <legend class="fieldset-legend">
                        Judul SubTask
                    </legend>

                    <input
                        th:field="*{title}"
                        class="input w-full"
                        type="text"
                        required
                    />
                </fieldset>

                <fieldset class="fieldset">
                    <legend class="fieldset-legend">
                        Deskripsi
                    </legend>

                    <textarea
                        th:field="*{description}"
                        class="textarea w-full"
                        rows="4"
                    ></textarea>
                </fieldset>

                <div class="flex justify-end gap-2 mt-4">

                    <a
                        th:href="@{/class/{classCode}/tasks/{taskId}
                        (classCode=${classs.classCode},
                        taskId=${task.id})}"
                        class="btn btn-ghost">
                        Batal
                    </a>

                    <button
                        type="submit"
                        class="btn btn-primary">
                        Simpan Perubahan
                    </button>

                </div>

            </form>

        </div>
    </div>

</div>
</body>
</html>
