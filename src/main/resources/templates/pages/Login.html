<!doctype html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/Auth}">
	<head>
		<title>Login</title>
	</head>
	<body>
		<div layout:fragment="content" class="card w-full shadow max-w-sm bg-base-100">
			<div class="card-body gap-4">
				<div class="text-center">
					<h1 class="text-2xl font-bold">Senang Melihatmu Lagi!</h1>
					<p class="text-base-content/60 text-sm mt-1">Masuk ke akun kamu untuk melanjutkan.</p>
				</div>

				<!-- ====== ALERTS ======  -->
				<!-- error -->
				<div th:if="${param.error}" class="alert alert-soft alert-error">
					<span th:text="${param.error[0]}">Login gagal, coba lagi.</span>
				</div>

				<!-- logout -->
				<div th:if="${param.logout}" class="alert alert-success alert-soft">
					<span>Logout berhasil.</span>
				</div>
				<!-- ====== ALERTS ======  -->

				<form method="post" th:action="@{/auth/login}" class="flex flex-col">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

					<fieldset class="fieldset">
						<legend class="fieldset-legend">Email atau username</legend>
						<input class="input validator" required type="text" name="username" placeholder="johndoe" />
						<span class="validator-hint">Wajib diisi</span>
					</fieldset>

					<fieldset class="fieldset">
						<legend class="fieldset-legend">Password</legend>
						<input class="input validator" required type="password" name="password" placeholder="••••••••" />
						<span class="validator-hint">Wajib diisi</span>
					</fieldset>

					<fieldset class="fieldset">
						<label class="label">
							<input type="checkbox" name="remember-me" class="checkbox checkbox-sm" />
							Ingat aku
						</label>
					</fieldset>

					<button type="submit" class="btn btn-primary w-full mt-4">Masuk</button>
				</form>

				<p class="text-center text-sm text-base-content/60">
					Belum punya akun?
					<a href="/auth/register" class="link link-primary">Daftar</a>
				</p>
			</div>
		</div>
	</body>
</html>
