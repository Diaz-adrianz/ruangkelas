<!doctype html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/Auth}">
	<head>
		<title>Reset Password</title>
	</head>
	<body>
		<div layout:fragment="content" class="card w-full shadow max-w-sm bg-base-100">
			<div class="card-body gap-4">
				<div class="text-center">
					<h1 class="text-2xl font-bold">Reset Password</h1>
					<p class="text-base-content/60 text-sm mt-1">
						Masukkan kode OTP yang kamu terima, lalu buat password baru kamu
					</p>
				</div>

				<!-- ====== ALERTS ======  -->
				<!-- success  -->
				<div th:if="${success}" class="alert alert-soft alert-success">
					<span th:text="${success}"></span>
				</div>

				<!-- error -->
				<div th:if="${error}" class="alert alert-soft alert-error">
					<span th:text="${error}"></span>
				</div>

				<div th:if="${errors}" class="alert alert-warning alert-soft">
					<div>
						<h3 class="font-bold">Validasi gagal.</h3>
						<ul class="list-disc ps-4">
							<li th:each="err : ${errors}" th:text="${err.defaultMessage}"></li>
						</ul>
					</div>
				</div>
				<!-- ====== ALERTS ======  -->

				<form method="post" th:action="@{/auth/reset-password}" th:object="${resetPasswordDto}" class="flex flex-col">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

					<fieldset class="fieldset">
						<legend class="fieldset-legend">Kode OTP</legend>
						<input
							th:field="*{otp}"
							class="input validator w-full"
							required
							type="number"
							name="otp"
							placeholder="xxxxxx"
							pattern="^\d{6}$"
						/>
						<span class="validator-hint">6 karakter.</span>
					</fieldset>

					<fieldset class="fieldset">
						<legend class="fieldset-legend">Password</legend>
						<input
							th:field="*{password}"
							class="input validator w-full"
							required
							type="password"
							name="password"
							placeholder="••••••••"
							pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,16}$"
						/>
						<span class="validator-hint">8 - 16 karakter. Minimal ada 1 angka, 1 huruf kecil, dan 1 huruf besar.</span>
					</fieldset>

					<fieldset class="fieldset">
						<legend class="fieldset-legend">Konfirmasi Password</legend>
						<input
							th:field="*{confirmPassword}"
							class="input validator w-full"
							required
							type="password"
							name="confirmPassword"
							placeholder="••••••••"
							pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,16}$"
						/>
						<span class="validator-hint">8 - 16 karakter. Minimal ada 1 angka, 1 huruf kecil, dan 1 huruf besar.</span>
					</fieldset>

					<button type="submit" class="btn btn-primary w-full mt-4">Simpan</button>
				</form>
			</div>
		</div>
	</body>
</html>
