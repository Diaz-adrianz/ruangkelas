<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title th:text="${classs.name}">Detail Kelas</title>
	</head>
	<body>
		<div layout:fragment="content" class="mx-auto max-w-5xl p-4">
			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li th:text="${classs.name}"></li>
				</ul>
			</div>

			<div th:if="${error}" class="alert alert-soft alert-error mb-4">
				<span th:text="${error}"></span>
			</div>
			<div class="flex items-center justify-between flex-wrap gap-4 mb-4">
				<h1 class="typo-heading-xl" th:text="${classs.name} + ' - ' + ${classs.course.name}"></h1>
				<div class="dropdown dropdown-end">
					<div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
						<i class="ri-more-2-line text-sm"></i>
					</div>
					<ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-48 mt-2 z-10">
						<li><a th:href="@{/class/edit/{id}(id=${classs.id})}">Edit Kelas</a></li>
						<li>
							<form th:action="@{/class/delete/{id}(id=${classs.id})}" method="post">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
								<button
									type="submit"
									class="text-error w-full text-left"
									onclick="return confirm('Yakin hapus kelas ini?');"
								>
									Hapus Kelas
								</button>
							</form>
						</li>
					</ul>
				</div>
			</div>

			<div class="flex flex-col gap-2 mb-8">
				<div class="flex gap-2 items-center">
					<i class="ri-hashtag opacity-60"></i>
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Kode kelas</p>
					<p class="typo-body-md" th:text="${classs.id}"></p>
				</div>
				<div class="flex gap-2 items-center">
					<i class="ri-file-marked-line opacity-60"></i>
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Mata kuliah</p>
					<p class="typo-body-md" th:text="${classs.course.name}"></p>
				</div>
				<div class="flex gap-2 items-center">
					<i class="ri-calendar-2-line opacity-60"></i>
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Tahun Ajaran</p>
					<p class="typo-body-md" th:text="${classs.year}"></p>
				</div>
				<div class="flex gap-2 items-center">
					<i class="ri-list-ordered-2 opacity-60"></i>
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Semester</p>
					<p class="typo-body-md" th:text="${classs.semester == 'ODD' ? 'Ganjil' : 'Genap'}"></p>
				</div>
				<div class="flex gap-2 items-center">
					<i class="ri-graduation-cap-line opacity-60"></i>
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Dosen</p>
					<p class="typo-body-md">-</p>
				</div>
			</div>

			<div class="tabs tabs-border">
				<label class="tab has-[input:checked]:text-primary">
					<input type="radio" name="tabs" checked />
					Tugas
					<div
						th:if="${tasks != null && #lists.size(tasks) > 0}"
						th:text="${#lists.size(tasks)}"
						class="badge badge-sm ml-2 bg-primary text-primary-content"
					></div>
				</label>
				<div class="tab-content pt-4">
					<div class="flex justify-end mb-4">
						<a th:href="@{/class/{classId}/tasks/create(classId=${classs.id})}" class="btn btn-primary btn-sm">
							<i class="ri-add-large-line"></i>
							Tambah Tugas
						</a>
					</div>

					<div th:if="${#lists.isEmpty(tasks)}" class="text-center py-12 text-base-content/60 typo-body-md">
						Belum ada tugas yang dibuat di kelas ini.
					</div>

					<div th:if="${!#lists.isEmpty(tasks)}" class="flex flex-col gap-2">
						<a
							th:each="task : ${tasks}"
							th:href="@{/class/{classId}/tasks/{taskId}(classId=${classs.id}, taskId=${task.id})}"
							class="card bg-base-100 border border-base-300 hover:shadow-lg transition-shadow cursor-pointer"
						>
							<div class="card-body p-4 flex-row items-center justify-between gap-4">
                                <div>
                                    <p class="typo-body-md" th:text="${task.title}"></h3>
                                    <p
                                        class="typo-caption text-base-content/60"
                                        th:text="'Tenggat ' + ${#temporals.format(task.deadline, 'EEEE, dd MMM yyyy HH:mm')}"
                                    ></p>
                                </div>

                                <span
                                    th:if="${task.daysUntilDeadline >= 4 and task.daysUntilDeadline <= 7}"
                                    class="badge badge-info ps-2"
                                >
                                    <i class="ri-timer-line"></i>
                                    <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                                </span>

                                <span
                                    th:if="${task.daysUntilDeadline >= 2 and task.daysUntilDeadline <= 3}"
                                    class="badge badge-warning ps-2"
                                >
                                    <i class="ri-timer-line"></i>
                                    <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                                </span>

                                <span
                                    th:if="${task.daysUntilDeadline >= 0 and task.daysUntilDeadline <= 1}"
                                    class="badge badge-error ps-2"
                                >
                                    <i class="ri-timer-line"></i>
                                    <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                                </span>
							</div>
						</a>
					</div>
				</div>

				<label class="tab has-[input:checked]:text-primary">
					<input type="radio" name="tabs" />
					Jadwal
				</label>
				<div class="tab-content pt-4">Jadwal</div>

				<label class="tab has-[input:checked]:text-primary">
					<input type="radio" name="tabs" />
					Materi Ajar
				</label>
				<div class="tab-content pt-4">Materi Ajar</div>

				<label class="tab has-[input:checked]:text-primary gap-4">
					<input type="radio" name="tabs" />
					Anggota
					<div th:if="${#lists.size(members) > 0}" th:text="${#lists.size(members)}"></div>
				</label>
				<div class="tab-content pt-4">
					<div th:if="${!#lists.isEmpty(pendingMembers)}" class="bg-info/10 rounded-box p-4 mb-6">
						<p
							class="typo-label text-info mb-4"
							th:text="'Permintaan bergabung (' + ${#lists.size(pendingMembers)} + ')'"
						></p>
						<div class="flex flex-wrap gap-2">
							<div
								th:each="req : ${pendingMembers}"
								class="card bg-base-100 rounded-xl flex-1 min-w-60 overflow-hidden"
							>
								<div class="card-body flex-row items-center justify-between p-4">
									<p class="typo-body-md grow" th:text="${req.user.name}"></p>
									<form th:action="@{/class/member/{id}/approve(id=${req.id})}" method="post">
										<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
										<input type="hidden" name="classId" th:value="${classs.id}" />
										<button type="submit" class="btn btn-sm btn-success btn-soft">Terima</button>
									</form>
									<form th:action="@{/class/member/{id}/reject(id=${req.id})}" method="post">
										<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
										<input type="hidden" name="classId" th:value="${classs.id}" />
										<button type="submit" class="btn btn-sm btn-error btn-soft">Tolak</button>
									</form>
								</div>
							</div>
						</div>
					</div>

					<div class="flex flex-col gap-2">
						<div th:each="member : ${members}" class="card bg-base-100 border border-base-300">
							<div class="card-body flex-row items-center justify-between p-4">
								<div>
									<p class="typo-body-md">
										<span th:text="${member.user.name}"></span>
										<span th:if="${member.user.username == #authentication.principal.username}">(Saya)</span>
									</p>
									<p
										class="typo-caption text-base-content/60"
										th:text="${member.role.name() == 'ADMIN' ? 'Admin' : 'Anggota'}"
									></p>
								</div>

								<div
									class="dropdown dropdown-end"
									th:if="${member.user.username != #authentication.principal.username}"
								>
									<div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
										<i class="ri-more-2-line text-sm"></i>
									</div>
									<ul
										tabindex="0"
										class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-44 mt-2 z-10"
									>
										<li th:if="${member.role.name() != 'ADMIN'}">
											<form th:action="@{/class/member/{id}/promote(id=${member.id})}" method="post">
												<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
												<input type="hidden" name="classId" th:value="${classs.id}" />
												<button type="submit" class="w-full text-left">Promote as Admin</button>
											</form>
										</li>
										<li th:if="${member.role.name() == 'ADMIN'}">
											<form th:action="@{/class/member/{id}/demote(id=${member.id})}" method="post">
												<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
												<input type="hidden" name="classId" th:value="${classs.id}" />
												<button type="submit" class="w-full text-left">Demote Admin</button>
											</form>
										</li>
										<li>
											<form th:action="@{/class/member/{id}/kick(id=${member.id})}" method="post">
												<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
												<input type="hidden" name="classId" th:value="${classs.id}" />
												<button
													type="submit"
													class="w-full text-error"
													onclick="return confirm('Yakin keluarkan anggota ini?');"
												>
													Kick
												</button>
											</form>
										</li>
									</ul>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
