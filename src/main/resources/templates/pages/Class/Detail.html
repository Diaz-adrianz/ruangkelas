<!DOCTYPE html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="~{layouts/Home}"
>
    <head>
        <title th:text="${kelas.name}">Detail Kelas</title>
    </head>
    <body>
        <div layout:fragment="content" class="w-full mx-auto max-w-5xl py-8 px-4">
            <div class="text-sm text-base-content/60 mb-4">
                <a th:href="@{/class}" class="hover:underline">Beranda</a>
                <span> &gt; </span>
                <span th:text="${kelas.name}"></span>
            </div>

            <div class="flex justify-between items-start mb-6">
                <h1 class="text-2xl font-bold" th:text="${kelas.name} + ' – ' + ${kelas.course.name}"></h1>

                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01" />
                        </svg>
                    </div>
                    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-48 mt-2 z-10">
                        <li><a th:href="@{/class/edit/{id}(id=${kelas.id})}">Edit Kelas</a></li>
                        <li>
                            <form th:action="@{/class/delete/{id}(id=${kelas.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="text-error w-full text-left"
                                    onclick="return confirm('Yakin hapus kelas ini?')">Hapus Kelas</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="flex flex-col gap-2 mb-8">
                <div class="flex gap-2 items-center">
                    <span class="text-base-content/60 w-36">Kode kelas</span>
                    <span th:text="${kelas.id}"></span>
                </div>
                <div class="flex gap-2 items-center">
                    <span class="text-base-content/60 w-36">Mata Kuliah</span>
                    <span th:text="${kelas.course.name}"></span>
                </div>
                <div class="flex gap-2 items-center">
                    <span class="text-base-content/60 w-36">Tahun Ajaran</span>
                    <span th:text="${kelas.year}"></span>
                </div>
                <div class="flex gap-2 items-center">
                    <span class="text-base-content/60 w-36">Semester</span>
                    <span th:text="${kelas.semester == 'ODD' ? 'Ganjil' : 'Genap'}"></span>
                </div>
            </div>

            <div role="tablist" class="tabs tabs-bordered mb-6">
                <a role="tab" class="tab">Tugas</a>
                <a role="tab" class="tab">Jadwal</a>
                <a role="tab" class="tab">Materi Ajar</a>
                <a role="tab" class="tab tab-active font-medium">
                    Anggota <span class="badge badge-sm ml-1" th:text="${#lists.size(members)}"></span>
                </a>
            </div>

            <div th:if="${error}" class="alert alert-error mb-4">
                <span th:text="${error}"></span>
            </div>

            <div th:if="${!#lists.isEmpty(pendingRequests)}" class="bg-info/10 rounded-2xl p-4 mb-6">
                <p class="text-info font-medium mb-3" th:text="'Permintaan bergabung (' + ${#lists.size(pendingRequests)} + ')'"></p>
                <div class="flex flex-wrap gap-3">
                    <div th:each="req : ${pendingRequests}" class="card bg-base-100 rounded-xl flex-1 min-w-64">
                        <div class="card-body flex-row items-center justify-between py-3 px-4">
                            <span th:text="${req.user.name}"></span>
                            <div class="flex gap-2">
                                <form th:action="@{/class/member/{id}/approve(id=${req.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="classId" th:value="${kelas.id}" />
                                    <button type="submit" class="btn btn-xs btn-success btn-soft">Terima</button>
                                </form>
                                <form th:action="@{/class/member/{id}/reject(id=${req.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="classId" th:value="${kelas.id}" />
                                    <button type="submit" class="btn btn-xs btn-error btn-soft">Tolak</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <div th:each="member : ${members}" class="card bg-base-100 border border-base-200 rounded-xl">
                    <div class="card-body flex-row items-center justify-between py-4 px-5">
                        <div>
                            <p class="font-medium">
                                <span th:text="${member.user.name}"></span>
                                <span th:if="${member.user.username == #authentication.principal.username}"> (Saya)</span>
                            </p>
                            <p class="text-sm text-base-content/60" th:text="${member.role == 'ADMIN' ? 'Admin' : 'Anggota'}"></p>
                        </div>

                        <div class="dropdown dropdown-end" th:if="${member.user.username != #authentication.principal.username}">
                            <div tabindex="0" role="button" class="btn btn-ghost btn-sm btn-circle">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01" />
                                </svg>
                            </div>
                            <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-44 mt-2 z-10">
                                <li th:if="${member.role != 'ADMIN'}">
                                    <form th:action="@{/class/member/{id}/promote(id=${member.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="classId" th:value="${kelas.id}" />
                                        <button type="submit" class="w-full text-left">Promote as Admin</button>
                                    </form>
                                </li>
                                <li th:if="${member.role == 'ADMIN'}">
                                    <form th:action="@{/class/member/{id}/demote(id=${member.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="classId" th:value="${kelas.id}" />
                                        <button type="submit" class="w-full text-left">Demote Admin</button>
                                    </form>
                                </li>
                                <li>
                                    <form th:action="@{/class/member/{id}/kick(id=${member.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <input type="hidden" name="classId" th:value="${kelas.id}" />
                                        <button type="submit" class="w-full text-left text-error"
                                            onclick="return confirm('Yakin keluarkan anggota ini?')">Kick</button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
