<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    layout:decorate="~{layouts/Home}"
>
<head>
    <title th:text="${classs.name}">Detail Kelas</title>
    <style>
        /* ── base ── */
        .detail-page { max-width: 900px; margin: 0 auto; padding: 16px 20px 48px; }

        /* ── tabs ── */
        .rk-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #e2e6ea;
            margin-bottom: 24px;
            overflow-x: auto;
        }

        .rk-tab {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            height: 42px;
            padding: 0 18px;
            font-size: 14px;
            font-weight: 500;
            color: #687079;
            cursor: pointer;
            border: none;
            background: none;
            position: relative;
            white-space: nowrap;
            text-decoration: none;
            font-family: "Plus Jakarta Sans", sans-serif;
            transition: color 0.12s;
        }

        .rk-tab:hover { color: #050505; }

        .rk-tab.active {
            color: #009ca4;
            font-weight: 600;
        }

        .rk-tab.active::after {
            content: "";
            position: absolute;
            left: 0; right: 0; bottom: -1px;
            height: 2px;
            background: #009ca4;
            border-radius: 2px 2px 0 0;
        }

        .tab-badge {
            min-width: 20px;
            height: 20px;
            padding: 0 5px;
            border-radius: 999px;
            background: #2b2b2b;
            color: #fff;
            font-size: 11px;
            line-height: 20px;
            text-align: center;
            display: inline-block;
        }

        .rk-tab.active .tab-badge { background: #009ca4; }

        /* ── tab panels ── */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ══════════════════════════════
           JADWAL / CALENDAR
        ══════════════════════════════ */
        .calendar-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .month-controls { display: flex; align-items: center; gap: 12px; }

        .month-title {
            min-width: 130px;
            font-size: 18px;
            font-weight: 800;
            color: #050505;
        }

        .icon-btn {
            width: 32px; height: 32px;
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid #c6ccd2; border-radius: 8px;
            background: #fff; color: #687079; cursor: pointer;
        }
        .icon-btn:hover { background: #f5f7f9; }

        .add-sched-btn {
            height: 36px; padding: 0 16px;
            border-radius: 8px; border: 0;
            background: #009ca4; color: #fff;
            font-size: 13px; font-weight: 700;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 7px;
            text-decoration: none;
        }
        .add-sched-btn:hover { background: #007f87; }

        /* calendar grid */
        .cal-shell {
            border: 1px solid #d0d5da;
            border-radius: 12px;
            overflow: hidden;
        }

        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, minmax(0,1fr));
            height: 36px; align-items: center;
            text-align: center;
            font-size: 12px; font-weight: 800;
            color: #050505;
            background: #f8fafc;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0,1fr));
            border-top: 1px solid #70757a;
            border-left: 1px solid #70757a;
            background: #fff;
        }

        .cal-cell {
            min-height: 108px;
            border-right: 1px solid #70757a;
            border-bottom: 1px solid #70757a;
            padding: 10px 8px;
            background: #fbfcfd;
        }

        .cal-cell.muted { background: #f5f7f9; }

        .cal-cell.today .day-no {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: #009ca4; color: #fff;
            display: flex; align-items: center; justify-content: center;
        }

        .day-no {
            font-size: 13px; font-weight: 500;
            color: #050505; margin-bottom: 6px;
        }

        .cal-cell.muted .day-no { color: #a8afb6; }

        .ev-chip {
            width: 100%; border: 0; border-radius: 7px;
            background: #009ca4; color: #fff;
            padding: 6px 7px; text-align: left;
            font-size: 10px; line-height: 1.3;
            cursor: pointer; margin-bottom: 3px;
            display: block; transition: background .12s;
        }
        .ev-chip:hover { background: #007f87; }
        .ev-chip .ev-time { display: block; opacity: .85; }
        .ev-chip .ev-place { display: block; font-size: 12px; font-weight: 700; margin-top: 1px; }

        /* ══════════════════════════════
           MODALS
        ══════════════════════════════ */
        .rk-dialog { border: 0; border-radius: 16px; padding: 0; box-shadow: 0 8px 48px rgba(0,0,0,.18); }
        .rk-dialog::backdrop { background: rgba(0,0,0,.45); }

        /* detail modal */
        .modal-detail { max-width: 400px; width: 95vw; }

        .detail-hd {
            background: #009ca4; padding: 20px 22px 16px; color: #fff;
        }
        .detail-hd .dh-day { font-size: 13px; opacity: .85; margin: 0 0 3px; }
        .detail-hd .dh-date { font-size: 22px; font-weight: 800; margin: 0; }

        .detail-bd { padding: 16px 22px 4px; }
        .detail-row {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 10px 0; border-bottom: 1px solid #f0f2f4;
            font-size: 14px;
        }
        .detail-row:last-child { border-bottom: 0; }
        .detail-row i { width: 20px; color: #009ca4; font-size: 17px; flex-shrink: 0; margin-top: 1px; }
        .dr-label { font-size: 11px; color: #909599; text-transform: uppercase; letter-spacing: .04em; font-weight: 700; }
        .dr-val   { font-weight: 600; color: #050505; margin-top: 2px; }

        .detail-ft {
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
            padding: 14px 22px; border-top: 1px solid #f0f2f4;
        }

        .btn-del-d {
            height: 36px; padding: 0 14px; border-radius: 8px;
            border: 1px solid #fca5a5; background: #fff; color: #dc2626;
            font-size: 13px; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 5px; text-decoration: none;
        }
        .btn-del-d:hover { background: rgba(220,38,38,.06); color: #dc2626; }

        .btn-edit-d {
            height: 36px; padding: 0 16px; border-radius: 8px;
            border: 0; background: #009ca4; color: #fff;
            font-size: 13px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 5px; text-decoration: none;
        }
        .btn-edit-d:hover { background: #007f87; color: #fff; }

        .btn-close-d {
            height: 36px; padding: 0 16px; border-radius: 8px;
            border: 1px solid #c6ccd2; background: #fff;
            color: #454c54; font-size: 13px; font-weight: 600; cursor: pointer;
        }

        /* ══ responsive ══ */
        @media (max-width: 640px) {
            .detail-page { padding: 12px 12px 36px; }
            .cal-cell { min-height: 80px; padding: 7px 5px; }
            .calendar-toolbar { flex-direction: column; align-items: flex-start; }
            .add-sched-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="detail-page">

    <!-- breadcrumb -->
    <div class="breadcrumbs text-sm mb-4">
        <ul>
            <li><a href="/">Beranda</a></li>
            <li th:text="${classs.name}"></li>
        </ul>
    </div>

    <!-- alerts -->
    <div th:if="${success}" class="alert alert-success mb-4">
        <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error mb-4">
        <span th:text="${error}"></span>
    </div>

    <!-- header -->
    <div class="flex items-center justify-between flex-wrap gap-4 mb-4">
        <h1 class="typo-heading-xl"
            th:text="${classs.name} + ' - ' + (${classs.course != null ? classs.course.name : 'Mata kuliah tidak tersedia'})"></h1>

        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
                <i class="ri-more-2-line text-sm"></i>
            </div>
            <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-48 mt-2 z-10">
                <th:block th:if="${isAdmin}">
                    <li><a th:href="@{/class/edit/{c}(c=${classs.classCode})}">Edit Kelas</a></li>
                    <li>
                        <form th:action="@{/class/delete/{c}(c=${classs.classCode})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="text-error w-full text-left"
                                    onclick="return confirm('Yakin hapus kelas ini?');">Hapus Kelas</button>
                        </form>
                    </li>
                </th:block>
                <li>
                    <form th:action="@{/class/leave/{c}(c=${classs.classCode})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="w-full text-left text-error"
                                onclick="return confirm('Yakin mau keluar kelas?');">Keluar kelas</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>

    <!-- class info -->
    <div class="flex flex-col gap-2 mb-8">
        <div class="flex gap-2 items-center">
            <i class="ri-hashtag opacity-60"></i>
            <p class="typo-body-md w-1/3 max-w-40 opacity-60">Kode kelas</p>
            <p class="typo-body-md" th:text="${classs.classCode}"></p>
        </div>
        <div class="flex gap-2 items-center">
            <i class="ri-file-marked-line opacity-60"></i>
            <p class="typo-body-md w-1/3 max-w-40 opacity-60">Mata kuliah</p>
            <p class="typo-body-md" th:text="${classs.course != null ? classs.course.name : '-'}"></p>
        </div>
        <div class="flex gap-2 items-center">
            <i class="ri-calendar-2-line opacity-60"></i>
            <p class="typo-body-md w-1/3 max-w-40 opacity-60">Tahun Ajaran</p>
            <p class="typo-body-md" th:text="${classs.year}"></p>
        </div>
        <div class="flex gap-2 items-center">
            <i class="ri-list-ordered-2 opacity-60"></i>
            <p class="typo-body-md w-1/3 max-w-40 opacity-60">Semester</p>
            <p class="typo-body-md" th:text="${classs.semester == 'ODD' ? 'Ganjil' : 'Genap'}"></p>
        </div>
        <div class="flex gap-2 items-center">
            <i class="ri-graduation-cap-line opacity-60"></i>
            <p class="typo-body-md w-1/3 max-w-40 opacity-60">Dosen</p>
            <p class="typo-body-md"
               th:text="${classs.lecturerName != null and !classs.lecturerName.isEmpty()} ? ${classs.lecturerName} : '-'"></p>
        </div>
    </div>

    <!-- ═══════════ TABS ═══════════ -->
    <div class="rk-tabs" role="tablist">
        <button class="rk-tab active" role="tab" data-target="tab-tugas">
            Tugas <span class="tab-badge">0</span>
        </button>

        <button class="rk-tab" role="tab" data-target="tab-jadwal" id="tabJadwal">
            Jadwal
            <span class="tab-badge"
                  th:text="${schedules != null ? #lists.size(schedules) : 0}">0</span>
        </button>

        <button class="rk-tab" role="tab" data-target="tab-materi">
            Materi Ajar <span class="tab-badge">0</span>
        </button>

        <button class="rk-tab" role="tab" data-target="tab-anggota">
            Anggota
            <span class="tab-badge"
                  th:text="${members != null ? #lists.size(members) : 0}">0</span>
        </button>
    </div>

    <!-- ─── Panel: Tugas ─── -->
    <div id="tab-tugas" class="tab-panel active">
        <p class="text-sm text-gray-400">Belum ada tugas.</p>
    </div>

    <!-- ─── Panel: Jadwal ─── -->
    <div id="tab-jadwal" class="tab-panel">

        <!-- toolbar -->
        <div class="calendar-toolbar">
            <div class="month-controls">
                <button type="button" class="icon-btn" id="prevMonth">
                    <i class="ri-arrow-left-s-line"></i>
                </button>
                <div class="month-title" id="monthTitle">Juni 2026</div>
                <button type="button" class="icon-btn" id="nextMonth">
                    <i class="ri-arrow-right-s-line"></i>
                </button>
            </div>

            <!-- Tombol Tambah hanya tampil untuk admin -->
            <a th:if="${isAdmin}"
               class="add-sched-btn"
               th:href="@{/admin/jadwal/create/{code}(code=${classs.classCode})}">
                <i class="ri-add-line"></i> Tambah Jadwal
            </a>
        </div>

        <!-- calendar -->
        <div class="cal-shell">
            <div class="cal-weekdays">
                <div>Senin</div><div>Selasa</div><div>Rabu</div>
                <div>Kamis</div><div>Jumat</div><div>Sabtu</div><div>Minggu</div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </div>
    </div>

    <!-- ─── Panel: Materi Ajar ─── -->
    <div id="tab-materi" class="tab-panel">
        <p class="text-sm text-gray-400">Belum ada materi ajar.</p>
    </div>

    <!-- ─── Panel: Anggota ─── -->
    <div id="tab-anggota" class="tab-panel">

        <!-- pending requests -->
        <div th:if="${pendingRequests != null and !#lists.isEmpty(pendingRequests)}"
             class="bg-info/10 rounded-box p-4 mb-6">
            <p class="typo-label text-info mb-4"
               th:text="'Permintaan bergabung (' + ${#lists.size(pendingRequests)} + ')'"></p>
            <div class="flex flex-wrap gap-2">
                <div th:each="req : ${pendingRequests}"
                     class="card bg-base-100 rounded-xl flex-1 min-w-60 overflow-hidden">
                    <div class="card-body flex-row items-center justify-between p-4">
                        <p class="typo-body-md grow" th:text="${req.user.name}"></p>
                        <form th:action="@{/class/member/{id}/approve(id=${req.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="classCode" th:value="${classs.classCode}" />
                            <button class="btn btn-sm btn-success btn-soft">Terima</button>
                        </form>
                        <form th:action="@{/class/member/{id}/reject(id=${req.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="classCode" th:value="${classs.classCode}" />
                            <button class="btn btn-sm btn-error btn-soft">Tolak</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- member list -->
        <div class="flex flex-col gap-2">
            <div th:each="member : ${members}" class="card bg-base-100 border border-base-300">
                <div class="card-body flex-row items-center justify-between p-4">
                    <div>
                        <p class="typo-body-md">
                            <span th:text="${member.user.name}"></span>
                            <span th:if="${member.user.username == #authentication.principal.username}">(Saya)</span>
                        </p>
                        <p class="typo-caption text-base-content/60"
                           th:text="${member.role.name() == 'ADMIN' ? 'Admin' : 'Anggota'}"></p>
                    </div>

                    <div class="dropdown dropdown-end"
                         th:if="${isAdmin and member.user.username != #authentication.principal.username}">
                        <div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-sm">
                            <i class="ri-more-2-line text-sm"></i>
                        </div>
                        <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-44 mt-2 z-10">
                            <li th:if="${member.role.name() != 'ADMIN'}">
                                <form th:action="@{/class/member/{id}/promote(id=${member.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="classCode" th:value="${classs.classCode}" />
                                    <button class="w-full text-left">Jadikan Admin</button>
                                </form>
                            </li>
                            <li th:if="${member.role.name() == 'ADMIN'}">
                                <form th:action="@{/class/member/{id}/demote(id=${member.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="classCode" th:value="${classs.classCode}" />
                                    <button class="w-full text-left">Hapus Admin</button>
                                </form>
                            </li>
                            <li>
                                <form th:action="@{/class/member/{id}/kick(id=${member.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="classCode" th:value="${classs.classCode}" />
                                    <button class="w-full text-error"
                                            onclick="return confirm('Yakin keluarkan anggota ini?');">Keluarkan</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════ MODAL: Detail Jadwal ═══════════ -->
    <dialog id="detailSchedModal" class="rk-dialog modal-detail">
        <div class="detail-hd">
            <p class="dh-day" id="dDayName">Selasa</p>
            <p class="dh-date" id="dDate">2 Juni 2026</p>
        </div>
        <div class="detail-bd">
            <div class="detail-row">
                <i class="ri-time-line"></i>
                <div>
                    <div class="dr-label">Waktu</div>
                    <div class="dr-val" id="dTime">08.00</div>
                </div>
            </div>
            <div class="detail-row">
                <i class="ri-map-pin-line"></i>
                <div>
                    <div class="dr-label">Lokasi</div>
                    <div class="dr-val" id="dPlace">Ruang 4.0</div>
                </div>
            </div>
        </div>
        <div class="detail-ft">
            <a id="dDeleteBtn" href="#" class="btn-del-d"
               onclick="return confirm('Yakin hapus jadwal ini?')">
                <i class="ri-delete-bin-line"></i> Hapus
            </a>
            <div style="display:flex;gap:8px;">
                <button type="button" class="btn-close-d"
                        onclick="document.getElementById('detailSchedModal').close()">Tutup</button>
                <a id="dEditBtn" href="#" class="btn-edit-d">
                    <i class="ri-pencil-line"></i> Edit
                </a>
            </div>
        </div>
    </dialog>

    <!-- ═══════════ SCRIPTS ═══════════ -->
    <script th:inline="javascript">
        /* ── tab switching ── */
        document.querySelectorAll('.rk-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.rk-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');

                // lazy-load calendar the first time Jadwal tab is opened
                if (tab.dataset.target === 'tab-jadwal' && !window._calLoaded) {
                    window._calLoaded = true;
                    loadSchedules();
                }
            });
        });

        /* ── calendar ── */
        const classId = /*[[${classs.id}]]*/ 0;

        const MONTHS = ["Januari","Februari","Maret","April","Mei","Juni",
                        "Juli","Agustus","September","Oktober","November","Desember"];
        const DAYS   = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];

        let visibleDate = new Date();
        let schedules   = [];

        function toKey(d) {
            return d.getFullYear() + "-"
                 + String(d.getMonth()+1).padStart(2,"0") + "-"
                 + String(d.getDate()).padStart(2,"0");
        }

        function fmtTime(d) {
            return String(d.getHours()).padStart(2,"0") + "."
                 + String(d.getMinutes()).padStart(2,"0");
        }

        function fmtDate(d) {
            return `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
        }

        function renderCal() {
            const yr  = visibleDate.getFullYear();
            const mo  = visibleDate.getMonth();
            const first = new Date(yr, mo, 1);
            const offset = (first.getDay() + 6) % 7;
            const start  = new Date(yr, mo, 1 - offset);
            const todayK = toKey(new Date());

            document.getElementById("monthTitle").textContent = `${MONTHS[mo]} ${yr}`;
            const grid = document.getElementById("calGrid");
            grid.innerHTML = "";

            for (let i = 0; i < 42; i++) {
                const day = new Date(start);
                day.setDate(start.getDate() + i);

                const cell = document.createElement("div");
                cell.className = "cal-cell"
                    + (day.getMonth() === mo ? "" : " muted")
                    + (toKey(day) === todayK ? " today" : "");

                const dn = document.createElement("div");
                dn.className = "day-no";
                dn.textContent = day.getDate();
                cell.appendChild(dn);

                schedules
                    .filter(s => s.key === toKey(day))
                    .forEach(s => {
                        const chip = document.createElement("button");
                        chip.type = "button";
                        chip.className = "ev-chip";
                        chip.innerHTML = `<span class="ev-time">${s.endDate ? fmtTime(s.date) + " - " + fmtTime(s.endDate) : fmtTime(s.date)}</span>
                                          <span class="ev-place">${s.place}</span>`;
                        chip.addEventListener("click", () => openDetail(s));
                        cell.appendChild(chip);
                    });

                grid.appendChild(cell);
            }
        }

        function openDetail(s) {
            document.getElementById("dDayName").textContent = DAYS[s.date.getDay()];
            document.getElementById("dDate").textContent    = fmtDate(s.date);
            document.getElementById("dTime").textContent    = s.endDate
                ? `${fmtTime(s.date)} - ${fmtTime(s.endDate)}`
                : fmtTime(s.date);
            document.getElementById("dPlace").textContent   = s.place;
            document.getElementById("dEditBtn").href        = `/admin/jadwal/edit/${s.id}`;
            document.getElementById("dDeleteBtn").href      = `/admin/jadwal/delete/${s.id}`;
            document.getElementById("detailSchedModal").showModal();
        }

        async function loadSchedules() {
            try {
                const res  = await fetch(`/api/jadwal/data?classId=${classId}`);
                const data = await res.json();
                schedules = data
                    .filter(i => i.start)
                    .map(i => {
                        const date = new Date(i.start);
                        const endDate = i.end ? new Date(i.end) : null;
                        return { id: i.id, date, endDate, key: toKey(date), place: i.place || "Ruangan" };
                    });
            } catch(e) { schedules = []; }
            renderCal();
        }

        document.getElementById("prevMonth").addEventListener("click", () => {
            visibleDate = new Date(visibleDate.getFullYear(), visibleDate.getMonth()-1, 1);
            renderCal();
        });

        document.getElementById("nextMonth").addEventListener("click", () => {
            visibleDate = new Date(visibleDate.getFullYear(), visibleDate.getMonth()+1, 1);
            renderCal();
        });
    </script>
</div>
</body>
</html>
