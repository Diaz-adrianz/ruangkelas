<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  layout:decorate="~{layouts/Home}"
>
  <head>
    <title th:text="${classs.name}">Detail Kelas</title>

    <!-- badge active fix -->
    <style>
      .tab:has(input:checked) {
        color: #009ca4 !important;
      }

      .tab {
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: 14px;
        font-weight: 500;
        line-height: 140%;
        letter-spacing: -0.02em;
      }
    </style>
  </head>

  <body>
    <div layout:fragment="content" class="mx-auto max-w-5xl p-4">
      <!-- breadcrumb -->
      <div class="breadcrumbs text-sm mb-4">
        <ul>
          <li><a href="/">Beranda</a></li>
          <li th:text="${classs.name}"></li>
        </ul>
      </div>

      <!-- error -->
      <div th:if="${success}" class="alert alert-soft alert-success mb-4">
        <span th:text="${success}"></span>
      </div>

      <div th:if="${error}" class="alert alert-soft alert-error mb-4">
        <span th:text="${error}"></span>
      </div>

      <!-- header -->
      <div class="flex items-center justify-between flex-wrap gap-4 mb-4">
        <h1
          class="typo-heading-xl"
          id="classTitle"
          th:text="${classs.name} + ' - ' + ${classs.course.name}"
        ></h1>

        <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="btn btn-ghost btn-circle btn-sm"
          >
            <i class="ri-more-2-line text-sm"></i>
          </div>

          <ul
            tabindex="0"
            class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-48 mt-2 z-10"
          >
            <!-- MENU ADMIN (HANYA ADMIN) -->
            <th:block th:if="${isAdmin}">
              <li>
                <a
                  th:href="@{/class/edit/{classCode}(classCode=${classs.classCode})}"
                >
                  Edit Kelas
                </a>
              </li>

              <li>
                <form th:action="@{/class/delete/{classCode}(classCode=${classs.classCode})}" method="post">
                  <input type="hidden"
                      th:name="${_csrf.parameterName}"
                      th:value="${_csrf.token}" />

                  <button type="submit"
                      class="text-error w-full text-left"
                      onclick="return confirm('Yakin hapus kelas ini?');">
                    Hapus Kelas
                  </button>
                </form>
              </li>
            </th:block>

            <!-- LEAVE CLASS (SEMUA MEMBER BISA) -->
            <li>
              <form th:action="@{/class/leave/{classCode}(classCode=${classs.classCode})}" method="post">
                <input type="hidden"
                    th:name="${_csrf.parameterName}"
                    th:value="${_csrf.token}" />

                <button type="submit"
                    class="w-full text-left text-error"
                    onclick="return confirm('Yakin mau keluar kelas?');">
                  Keluar kelas
                </button>
              </form>
            </li>
          </ul>
        </div>
      </div>

      <!-- info -->
      <div class="flex flex-col gap-2 mb-8">
        <div class="flex gap-2 items-center">
          <i class="ri-hashtag opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Kode kelas</p>
          <p id="classCode" class="typo-body-md" th:text="${classs.classCode}"></p>
          <button
              type="button"
              class="btn btn-ghost btn-sm btn-circle"
              onclick="copyClassCode()"
              >
              <i class="ri-file-copy-line text-sm"></i>
          </button>
        </div>

        <div class="flex gap-2 items-center">
          <i class="ri-file-marked-line opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Mata kuliah</p>
          <p class="typo-body-md" th:text="${classs.course.name}"></p>
        </div>

        <div class="flex gap-2 items-center">
          <i class="ri-calendar-2-line opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Tahun Ajaran</p>
          <p class="typo-body-md" th:text="${classs.year}"></p>
        </div>

        <div class="flex gap-2 items-center">
          <i class="ri-list-ordered-2 opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Semester</p>
          <p class="typo-body-md" th:text="${classs.semester == 'ODD' ? 'Ganjil' : 'Genap'}"></p>
        </div>

        <div class="flex gap-2 items-center">
          <i class="ri-graduation-cap-line opacity-60"></i>
          <p class="typo-body-md w-1/3 max-w-40 opacity-60">Dosen</p>
          <p class="typo-body-md"
            th:text="${classs.lecturerName != null and !classs.lecturerName.isEmpty()} ? ${classs.lecturerName} : '-'"></p>
        </div>
      </div>

      <div class="tabs tabs-border">

        <!-- start: TASKS  -->
        <label class="tab gap-4">
          <input type="radio" name="tabs" data-fragment="tasks" checked />
          Tugas
					<span th:if="${#lists.size(tasks) > 0}" th:text="${#lists.size(tasks)}"></span>
        </label>
        <div class="tab-content pt-4">

          <div th:if="${isAdmin}" class="flex justify-end mb-4">
            <a th:href="@{/class/{classCode}/tasks/create(classCode=${classs.classCode})}" class="btn btn-primary btn-sm">
              <i class="ri-add-large-line"></i>
              Tambah Tugas
            </a>
          </div>

          <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-12 text-base-content/60 typo-body-md">
            Belum ada tugas yang dibuat di kelas ini.
          </div>

          <div th:if="${!#lists.isEmpty(tasks)}" class="flex flex-col gap-2">
            <a
              th:each="task : ${tasks}"
              th:href="@{/class/{classCode}/tasks/{taskId}(classCode=${classs.classCode}, taskId=${task.id})}"
              class="card bg-base-100 border border-base-300 hover:shadow-lg transition-shadow cursor-pointer"
            >
              <div class="card-body p-4 flex-row items-center justify-between gap-4">
                <div>
                  <p class="typo-body-md" th:text="${task.title}"></h3>
                  <p
                    class="typo-caption text-base-content/60"
                    th:text="'Batas waktu ' + ${#temporals.format(task.deadline, 'EEEE, dd MMM yyyy HH:mm')}"
                  ></p>
                </div>

                <span
                  th:if="${task.daysUntilDeadline >= 4 and task.daysUntilDeadline <= 7}"
                  class="badge badge-info ps-2"
                >
                  <i class="ri-timer-line"></i>
                  <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                </span>

                <span
                  th:if="${task.daysUntilDeadline >= 2 and task.daysUntilDeadline <= 3}"
                  class="badge badge-warning ps-2"
                >
                  <i class="ri-timer-line"></i>
                  <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                </span>

                <span
                  th:if="${task.daysUntilDeadline >= 0 and task.daysUntilDeadline <= 1}"
                  class="badge badge-error ps-2"
                >
                  <i class="ri-timer-line"></i>
                  <span th:text="'H-' + ${task.daysUntilDeadline}"></span>
                </span>
              </div>
            </a>
          </div>
        </div>
        <!-- end: TASKS  -->

       <!-- start: SCHEDULES  -->
        <label class="tab gap-4">
          <input type="radio" name="tabs" data-fragment="schedules" />
          Jadwal
					<span th:if="${schedulesCount > 0}" th:text="${schedulesCount}"></span>
        </label>
        
        <div class="tab-content pt-4">

          <!-- Header (Bulan & Tombol Tambah) -->
          <div class="flex items-center justify-between flex-wrap gap-4 mb-4">
            
            <!-- Navigasi Bulan -->
            <div class="flex items-center gap-4">
              <a
                th:href="@{/class/{classCode}(classCode=${classs.classCode}, year=${prevYearMonth.year}, month=${prevYearMonth.monthValue})} + '#schedules'"
                class="btn btn-ghost btn-sm btn-circle"
              >
                <i class="ri-arrow-left-s-line text-sm"></i>
              </a>

              <p class="typo-body-md text-center max-w-32" th:text="${currentMonthLabel}"></p>

              <a
                th:href="@{/class/{classCode}(classCode=${classs.classCode}, year=${nextYearMonth.year}, month=${nextYearMonth.monthValue})} + '#schedules'"
                class="btn btn-ghost btn-sm btn-circle"
              >
                <i class="ri-arrow-right-s-line text-sm"></i>
              </a>
            </div>

            <a th:if="${isAdmin}" th:href="@{/class/{classCode}/schedule/create(classCode=${classs.classCode})}" class="btn btn-primary btn-sm">
              <i class="ri-add-large-line"></i>
              Tambah Jadwal
            </a>
          </div>

          <!-- Grid Kalender -->
          <div class="card bg-base-100 border border-base-300 overflow-hidden">
            <div class="overflow-x-auto card-body p-0">
              <table class="table table-fixed min-w-md">
                <thead>
                  <tr class="bg-base-100">
                    <th class="text-center border-b border-base-300 ">Senin</th>
                    <th class="text-center border-b border-base-300 ">Selasa</th>
                    <th class="text-center border-b border-base-300 ">Rabu</th>
                    <th class="text-center border-b border-base-300 ">Kamis</th>
                    <th class="text-center border-b border-base-300 ">Jumat</th>
                    <th class="text-center border-b border-base-300 ">Sabtu</th>
                    <th class="text-center border-b border-base-300 ">Minggu</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="week : ${calendarWeeks}">
                    <td th:each="day : ${week}" class="align-top h-28 p-0 border-b border-r border-base-300 w-[14.28%]">
                      <div th:if="${day.date != null}" class="flex flex-col h-full">
                        <span class="typo-caption p-2" th:text="${day.date.dayOfMonth}"></span>
                        
                        <!-- Looping item jadwal di tanggal tersebut -->
                        <div class="flex flex-col gap-1 overflow-y-auto max-h-20 px-2">
                          <a th:each="schedule : ${day.schedules}"
                            th:href="@{/class/{classCode}/schedule/{scheduleId}(classCode=${classs.classCode}, scheduleId=${schedule.id})}"
                            class="rounded-box px-2 py-1.5 bg-accent text-accent-content  hover:opacity-90 block"
                          >
                            <div class="typo-caption text-primary" th:text="${#temporals.format(schedule.startTime, 'HH.mm')} + ' - ' + ${#temporals.format(schedule.endTime, 'HH.mm')}"></div>
                            <div class="typo-label truncate" th:text="${schedule.place}"></div>
                          </a>
                        </div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
        <!-- end: SCHEDULES  -->

        <!-- start: DOCUMENTS  -->
        <label class="tab gap-4">
          <input type="radio" name="tabs" data-fragment="documents" />
          Materi Ajar
					<span th:if="${#lists.size(documents) > 0}" th:text="${#lists.size(documents)}"></span>
        </label>
					
        <div class="tab-content pt-4">
          <div th:if="${isAdmin}" class="flex justify-end mb-4">
						<a
							th:href="@{/class/{classCode}/document/upload(classCode=${classs.classCode})}"
							class="btn btn-primary btn-sm"
						>
							<i class="ri-add-large-line"></i>
							Tambah Materi
						</a>
          </div>

          <div th:if="${#lists.isEmpty(documents)}" class="text-center py-12 text-base-content/60 typo-body-md">
            Belum ada materi yang diupload di kelas ini.
          </div>


          <div class="flex flex-col gap-2">
            <div th:each="document : ${documents}" class="card bg-base-100 border border-base-300">
              <div class="card-body flex-row items-center justify-between p-4">
                <div>
                  <p class="typo-body-md" th:text="${document.title}"></p>
                  <span 
                    class="typo-small text-base-content/60" 
                    th:text="|${document.fileType} - ${document.formatFileSize()} - ${#temporals.format(document.createdAt, 'dd MMM yyyy HH:mm a')}|">
                  </span>                         
                </div>
                <div class="dropdown dropdown-end">
                  <div
                    tabindex="0"
                    role="button"
                    class="btn btn-ghost btn-circle btn-sm"
                  >
                    <i class="ri-more-2-line text-sm"></i>
                  </div>
                  <ul
                    tabindex="0"
                    class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-44 mt-2 z-10"
                  >
                    <li>
                      <a th:href="@{/document/view/{id}(id=${document.id})}" target="_blank">
                        Lihat
                      </a>
                    </li>
                    <li>
                      <a th:href="@{/document/download/{id}(id=${document.id})}">
                        Download
                      </a>
                    </li>
                    <th:block th:if="${isAdmin}">
                      <li>
                        <form
                          th:action="@{/document/delete/{id}(id=${document.id})}"
                          method="post"
                          onsubmit="
                            return confirm(
                              'Yakin ingin menghapus dokumen ini?',
                            );
                          "
                        >
                          <input
                            type="hidden"
                            name="classId"
                            th:value="${classs.id}"
                          />

                          <button
                            type="submit"
                            class="text-error"
                          >
                            Hapus
                          </button>
                        </form>
                      </li>
                    </th:block>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- start: USER CLASSES  -->
        <label class="tab gap-4">
          <input type="radio" name="tabs" data-fragment="members" />
          Anggota
					<span th:if="${#lists.size(members) > 0}" th:text="${#lists.size(members)}"></span>
        </label>

        <div class="tab-content pt-4">

          <!-- pending -->
          <div th:if="${!#lists.isEmpty(pendingRequests)}"
            class="bg-info/10 rounded-box p-4 mb-6">

            <p class="typo-label text-info mb-4"
              th:text="'Permintaan bergabung (' + ${#lists.size(pendingRequests)} + ')'"></p>

            <div class="flex flex-wrap gap-2">
              <div 
                th:each="req : ${pendingRequests}" 
                class="card bg-base-100 rounded-xl flex-1 min-w-60 overflow-hidden"
              >
                <div class="card-body flex-row items-center justify-between p-4 gap-2">
                  <div class="size-8 rounded-full overflow-hidden">
                    <img
                      th:if="${req.user.profilePicture != null}"
                      th:src="${req.user.profilePicture}"
                      alt="Profile Picture"
                      class="w-full h-full object-cover"
                    />

                    <div
                      th:unless="${req.user.profilePicture != null}"
                      class="bg-neutral text-neutral-content text-sm size-full rounded-full flex items-center justify-center"
                    >
                      <span th:text="${req.user.getInitials()}"></span>
                    </div>
                  </div>

                  <p class="typo-body-md grow" th:text="${req.user.name}"></p>

                  <form th:action="@{/class/member/{id}/approve(id=${req.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="classCode" th:value="${classs.classCode}" />
                    <button class="btn btn-sm btn-success btn-soft">Terima</button>
                  </form>

                  <form th:action="@{/class/member/{id}/reject(id=${req.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="classCode" th:value="${classs.classCode}" />
                    <button class="btn btn-sm btn-error btn-soft">Tolak</button>
                  </form>
                </div>
              </div>
            </div>
          </div>

          <!-- members -->
          <div class="flex flex-col gap-2">
            <div
              th:each="member : ${members}"
              class="card bg-base-100 border border-base-300"
            >
              <div class="card-body flex-row items-center p-4 gap-2">
                <div class="size-12 rounded-full overflow-hidden">
                  <img
                    th:if="${member.user.profilePicture != null}"
                    th:src="${member.user.profilePicture}"
                    alt="Profile Picture"
                    class="w-full h-full object-cover"
                  />

                  <div
                    th:unless="${member.user.profilePicture != null}"
                    class="bg-neutral text-neutral-content size-full rounded-full flex items-center justify-center"
                  >
                    <span th:text="${member.user.getInitials()}"></span>
                  </div>
                </div>

                <div class="grow">
                  <p class="typo-body-md">
                    <span th:text="${member.user.name}"></span>
                    <span
                      th:if="${member.user.username == #authentication.principal.username}"
                    >
                      (Saya)
                    </span>
                  </p>

                  <p
                    class="typo-caption text-base-content/60"
                    th:text="${member.role.name() == 'ADMIN' ? 'Admin' : 'Anggota'}"
                  ></p>
                </div>

                <div
                  class="dropdown dropdown-end"
                  th:if="${isAdmin and member.user.username != #authentication.principal.username}"
                >
                  <div
                    tabindex="0"
                    role="button"
                    class="btn btn-ghost btn-circle btn-sm"
                  >
                    <i class="ri-more-2-line text-sm"></i>
                  </div>

                  <ul
                    tabindex="0"
                    class="dropdown-content menu bg-base-100 rounded-box border border-base-300 w-44 mt-2 z-10"
                  >
                    <li th:if="${member.role.name() != 'ADMIN'}">
                      <form
                        th:action="@{/class/member/{id}/promote(id=${member.id})}"
                        method="post"
                      >
                        <input
                          type="hidden"
                          th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}"
                        />
                        <input
                          type="hidden"
                          name="classCode"
                          th:value="${classs.classCode}"
                        />
                        <button class="w-full text-left">Jadikan Admin</button>
                      </form>
                    </li>

                    <li th:if="${member.role.name() == 'ADMIN'}">
                      <form
                        th:action="@{/class/member/{id}/demote(id=${member.id})}"
                        method="post"
                      >
                        <input
                          type="hidden"
                          th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}"
                        />
                        <input
                          type="hidden"
                          name="classCode"
                          th:value="${classs.classCode}"
                        />
                        <button class="w-full text-left">Hapus Admin</button>
                      </form>
                    </li>

                    <li>
                      <form
                        th:action="@{/class/member/{id}/kick(id=${member.id})}"
                        method="post"
                      >
                        <input
                          type="hidden"
                          th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}"
                        />
                        <input
                          type="hidden"
                          name="classCode"
                          th:value="${classs.classCode}"
                        />
                        <button
                          class="w-full text-error"
                          onclick="
                            return confirm('Yakin keluarkan anggota ini?');
                          "
                        >
                          Keluarkan
                        </button>
                      </form>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- end: USER CLASSES  -->

      </div>

      <script>
        async function copyClassCode() {
          const title = document.getElementById("classTitle").innerText;
          const code = document.getElementById("classCode").innerText;

          const text = `📚 Kamu diundang ke kelas "${title}"

━━━━━━━━━━━━━━━
🔑 Kode Kelas: *${code}*
🌐 https://ruangkelas.adrianz.me
━━━━━━━━━━━━━━━

Masukkan kode tersebut pada aplikasi untuk bergabung.

Sampai jumpa di kelas! 🚀`;
          await navigator.clipboard.writeText(text);

          // Your toast
          alert("Kode kelas disalin");
        }
      </script>

      <script>  
        function syncTabFromFragment() {
          const fragment = location.hash.replace('#', '');
          if (!fragment) return;
  
          const match = document.querySelector(`input[data-fragment="${fragment}"]`);
          if (match) match.checked = true;
        }
  
        function bindTabsToFragment() {
          document.querySelectorAll('input[type="radio"][name="tabs"]').forEach(input => {
            input.addEventListener('change', () => {
              const frag = input.dataset.fragment;
              if (frag) history.replaceState(null, '', `#${frag}`);
            });
          });
        }
  
  
        syncTabFromFragment();
        bindTabsToFragment();
      </script>
    </div>
  </body>
</html>
