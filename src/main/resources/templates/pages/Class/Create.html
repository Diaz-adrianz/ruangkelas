<!DOCTYPE html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/Home}"
>
    <head>
        <title>Buat Kelas</title>
    </head>
    <body>
        <div layout:fragment="content" class="w-full mx-auto max-w-xl py-8 px-4">
            <div class="mb-6">
                <a th:href="@{/class}" class="text-sm text-base-content/60 hover:underline">← Kembali</a>
            </div>

        <div th:if="${error}" class="alert alert-error mb-4">
            <span th:text="${error}"></span>
        </div>
            <h1 class="text-2xl font-bold mb-6">Buat Kelas Baru</h1>

            <div class="card bg-base-100 border border-base-200 rounded-2xl">
                <div class="card-body flex flex-col gap-4">
                    <form th:action="@{/class/create}" method="post" class="flex flex-col gap-4">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">Nama Kelas</span></label>
                            <input type="text" name="name" class="input input-bordered rounded-xl" placeholder="Contoh: Kelas A" required />
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">Mata Kuliah</span></label>
                            <select name="courseId" class="select select-bordered rounded-xl" required>
                                <option value="">Pilih Mata Kuliah</option>
                                <option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.name}"></option>
                            </select>
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">Tahun Ajaran</span></label>
                            <input type="text" name="year" class="input input-bordered rounded-xl" placeholder="Contoh: 2025/2026" required />
                        </div>

                        <div class="form-control">
                            <label class="label"><span class="label-text font-medium">Semester</span></label>
                            <select name="semester" class="select select-bordered rounded-xl" required>
                                <option th:each="sem : ${semesters}" th:value="${sem}" th:text="${sem == 'ODD' ? 'Ganjil' : 'Genap'}"></option>
                            </select>
                        </div>

                        <div class="flex gap-2 justify-end mt-2">
                            <a th:href="@{/class}" class="btn btn-ghost rounded-xl">Batal</a>
                            <button type="submit" class="btn btn-primary rounded-xl">Buat Kelas</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
