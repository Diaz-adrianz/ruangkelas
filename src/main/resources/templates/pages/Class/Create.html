<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title>Buat Kelas</title>
	</head>
	<body>
		<div layout:fragment="content" class="mx-auto max-w-5xl p-4">
			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li>Buat kelas</li>
				</ul>
			</div>

			<div class="flex items-center justify-between flex-wrap gap-4 mb-4">
				<h1 class="typo-heading-xl">Buat Kelas Baru</h1>
			</div>

			<!-- ====== ALERTS ======  -->
			<!-- error -->
			<div th:if="${error}" class="alert alert-soft alert-error mb-4">
				<span th:text="${error}"></span>
			</div>

			<!-- dto errors -->
			<div th:if="${errors}" class="alert alert-warning alert-soft mb-4">
				<div>
					<h3 class="font-bold">Validasi gagal.</h3>
					<ul class="list-disc ps-4">
						<li th:each="err : ${errors}" th:text="${err.defaultMessage}"></li>
					</ul>
				</div>
			</div>

			<!-- ====== ALERTS ======  -->

			<div class="card bg-base-100 border-base-300 border">
				<div class="card-body">
					<form th:action="@{/class/create}" th:object="${createClassDto}" method="post" class="flex flex-col">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

						<fieldset class="fieldset">
							<legend class="fieldset-legend">Nama kelas</legend>
							<input
								th:field="*{name}"
								class="input validator w-full"
								required
								type="text"
								placeholder="Contoh: Kelas A"
								minlength="3"
								maxlength="100"
							/>
							<span class="validator-hint">3 - 100 karakter</span>
						</fieldset>

						<fieldset class="fieldset">
							<legend class="fieldset-legend">Mata kuliah</legend>
							<select th:field="*{courseId}" class="select w-full validator" required>
								<option value="" disabled>Pilih Mata Kuliah</option>
								<option th:each="course : ${courses}" th:value="${course.id}" th:text="${course.name}"></option>
							</select>
						</fieldset>

						<fieldset class="fieldset">
							<legend class="fieldset-legend">Tahun ajaran</legend>
							<input
								th:field="*{year}"
								class="input validator w-full"
								required
								type="text"
								placeholder="Contoh: 2025/2026"
								pattern="^\d{4}/\d{4}$"
							/>
							<span class="validator-hint">Masukkan format tahun yang valid</span>
						</fieldset>

						<fieldset class="fieldset">
							<legend class="fieldset-legend">Semester</legend>
							<select name="semester" class="select w-full validator" required>
								<option
									th:each="sem : ${semesters}"
									th:value="${sem}"
									th:text="${sem.name() == 'ODD' ? 'Ganjil' : 'Genap'}"
								></option>
							</select>
						</fieldset>

						<div class="flex gap-2 justify-end mt-4">
							<a th:href="@{/class}" class="btn btn-ghost rounded-xl">Batal</a>
							<button type="submit" class="btn btn-primary rounded-xl">Buat Kelas</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
