<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title>Profil</title>
	</head>

	<body>
		<div layout:fragment="content" class="max-w-5xl mx-auto p-4">

			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li>Profil</li>
				</ul>
			</div>

			<!-- ALERT -->
			<div th:if="${success}" class="alert alert-soft alert-success mb-4">
				<span th:text="${success}"></span>
			</div>

			<div th:if="${error}" class="alert alert-soft alert-error mb-4">
				<span th:text="${error}"></span>
			</div>


			<div class="flex items-center justify-between mb-6">

				<h1 class="typo-heading-xl">
					Profil Saya
				</h1>

				<div class="flex gap-2">

					<a
						href="/profile/edit"
						class="btn btn-primary btn-sm btn-outline"
					>
						<i class="ri-pencil-line text-sm"></i>
						Edit Profil
					</a>

					<form
						th:if="${user.profilePicture != null}"
						method="post"
						th:action="@{/profile/delete-photo}"
					>

						<input
							type="hidden"
							th:name="${_csrf.parameterName}"
							th:value="${_csrf.token}"
						/>

						<button
							type="submit"
							class="btn btn-error btn-outline btn-sm"
							onclick="return confirm('Hapus foto profil?')"
						>
							Hapus Foto
						</button>
					</form>
				</div>
			</div>

			
			<div class="flex flex-col gap-4 md:flex-row md:gap-16">
				<div class="avatar">
					<div class="size-52 md:size-32 rounded-full overflow-hidden">
						<img
							th:if="${user.profilePicture != null}"
							th:src="${user.profilePicture}"
							alt="Profile Picture"
							class="w-full h-full object-cover"
						/>

						<div
							th:unless="${user.profilePicture != null}"
							class="bg-neutral text-neutral-content text-4xl size-full rounded-full flex items-center justify-center"
						>
							<span sec:authentication="principal.initials"></span>
						</div>
					</div>
				</div>

				<div class="flex flex-col gap-2 grow">
					<div class="flex">
						<p class="typo-body-md w-1/3 max-w-40 opacity-60">
							Username
						</p>
	
						<p
							class="typo-body-md grow"
							th:text="'@' + ${user.username}"
						></p>
					</div>
	
					<div class="flex">
						<p class="typo-body-md w-1/3 max-w-40 opacity-60">
							Email
						</p>
	
						<p
							class="typo-body-md grow"
							th:text="${user.email}"
						></p>
					</div>
	
					<div class="flex">
						<p class="typo-body-md w-1/3 max-w-40 opacity-60">
							Nama
						</p>
	
						<p
							class="typo-body-md grow"
							th:text="${user.name}"
						></p>
					</div>
	
					<div class="flex">
						<p class="typo-body-md w-1/3 max-w-40 opacity-60">
							NIM
						</p>
	
						<p
							class="typo-body-md grow"
							th:text="${user.nim}"
						></p>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
