<!doctype html>
<html
	xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layouts/Home}"
>
	<head>
		<title>Profil</title>
	</head>

	<body>
		<div layout:fragment="content" class="max-w-5xl mx-auto p-4">
			<div class="breadcrumbs text-sm mb-4">
				<ul>
					<li><a href="/">Beranda</a></li>
					<li>Profil</li>
				</ul>
			</div>

			<div class="flex items-center justify-between mb-4">
				<h1 class="typo-heading-xl">Profil Saya</h1>
				<a href="/profile/edit" class="btn btn-primary btn-sm btn-soft">
					<i class="ri-pencil-line text-sm"></i>
					Edit Profil
				</a>
			</div>

			<div class="flex flex-col gap-2">
				<div class="flex">
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Username</p>
					<p class="typo-body-md grow" th:text="'@' + ${user.username}"></p>
				</div>
				<div class="flex">
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Email</p>
					<p class="typo-body-md grow" th:text="${user.email}"></p>
				</div>
				<div class="flex">
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">Nama</p>
					<p class="typo-body-md grow" th:text="${user.name}"></p>
				</div>
				<div class="flex">
					<p class="typo-body-md w-1/3 max-w-40 opacity-60">NIM</p>
					<p class="typo-body-md grow" th:text="${user.nim}"></p>
				</div>
			</div>
		</div>
	</body>
</html>
