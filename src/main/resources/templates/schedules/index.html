<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/Home}"
>
<head>
    <title>Semua Jadwal - Admin</title>
    <style>
        .admin-page {
            max-width: 1020px;
            margin: 0 auto;
            padding: 20px 24px 48px;
        }

        /* ── header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .page-heading {
            font-size: 26px;
            font-weight: 800;
            color: #050505;
            margin: 0;
        }

        /* ── table card ── */
        .table-card {
            background: #fff;
            border: 1px solid #e2e6ea;
            border-radius: 14px;
            overflow: hidden;
        }

        .table-search-bar {
            padding: 18px 20px;
            border-bottom: 1px solid #f0f2f4;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-input-wrap {
            position: relative;
            flex: 1;
        }

        .search-input-wrap i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #909599;
            font-size: 16px;
        }

        .search-input {
            width: 100%;
            height: 38px;
            padding: 0 12px 0 36px;
            border: 1px solid #c6ccd2;
            border-radius: 8px;
            font-size: 14px;
            color: #050505;
            background: #f8fafc;
            box-sizing: border-box;
            outline: none;
        }

        .search-input:focus {
            border-color: #009ca4;
            background: #fff;
        }

        /* ── table ── */
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .schedule-table thead th {
            padding: 11px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: #687079;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: #f8fafc;
            border-bottom: 1px solid #e8eaed;
        }

        .schedule-table tbody tr {
            border-bottom: 1px solid #f0f2f4;
            transition: background 0.1s;
        }

        .schedule-table tbody tr:last-child { border-bottom: 0; }
        .schedule-table tbody tr:hover { background: #f8fafc; }

        .schedule-table td {
            padding: 14px 20px;
            color: #050505;
            vertical-align: middle;
        }

        .cell-class {
            font-weight: 700;
            color: #050505;
        }

        .cell-course {
            font-size: 12px;
            color: #687079;
            margin-top: 2px;
        }

        .badge-place {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(0, 156, 164, 0.10);
            color: #007f87;
            font-size: 12px;
            font-weight: 600;
        }

        /* ── action buttons ── */
        .action-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid #e2e6ea;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #687079;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
        }

        .btn-icon:hover { background: #f5f7f9; color: #050505; }

        .btn-icon.edit:hover {
            background: rgba(255, 186, 8, 0.10);
            color: #c47e00;
            border-color: #f5d76e;
        }

        .btn-icon.delete:hover {
            background: rgba(220, 53, 69, 0.08);
            color: #b91c1c;
            border-color: #fca5a5;
        }

        /* ── empty state ── */
        .empty-state {
            text-align: center;
            padding: 64px 20px;
            color: #687079;
        }

        .empty-state i {
            font-size: 48px;
            color: #c6ccd2;
            display: block;
            margin-bottom: 14px;
        }

        .empty-state p {
            font-size: 15px;
            margin: 0;
        }

        /* ── add button (header) ── */
        .btn-add {
            height: 38px;
            padding: 0 18px;
            border-radius: 8px;
            border: 0;
            background: #009ca4;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-add:hover { background: #007f87; color: #fff; }

        /* ── delete confirm dialog ── */
        .confirm-dialog::backdrop { background: rgba(0,0,0,0.45); }
        .confirm-dialog {
            border: 0;
            border-radius: 14px;
            padding: 28px 28px 24px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.18);
        }

        .confirm-dialog h3 {
            font-size: 18px;
            font-weight: 800;
            color: #050505;
            margin: 0 0 8px;
        }

        .confirm-dialog p {
            font-size: 14px;
            color: #687079;
            margin: 0 0 24px;
        }

        .confirm-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-outline {
            height: 38px;
            padding: 0 18px;
            border-radius: 8px;
            border: 1px solid #c6ccd2;
            background: #fff;
            color: #454c54;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-danger {
            height: 38px;
            padding: 0 18px;
            border-radius: 8px;
            border: 0;
            background: #dc2626;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .btn-danger:hover { background: #b91c1c; color: #fff; }

        @media (max-width: 720px) {
            .admin-page { padding: 14px 12px 36px; }
            .schedule-table thead { display: none; }
            .schedule-table, .schedule-table tbody, .schedule-table tr, .schedule-table td {
                display: block;
                width: 100%;
            }
            .schedule-table td { padding: 8px 16px; }
            .schedule-table tr { padding: 12px 0; }
            .action-group { padding-bottom: 8px; }
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="admin-page">

    <div class="page-header">
        <h1 class="page-heading">Semua Jadwal</h1>
    </div>

    <div class="table-card">
        <!-- Search bar -->
        <div class="table-search-bar">
            <div class="search-input-wrap">
                <i class="ri-search-line"></i>
                <input
                    id="searchInput"
                    type="text"
                    class="search-input"
                    placeholder="Cari kelas atau ruangan..."
                />
            </div>
        </div>

        <!-- Table -->
        <div th:if="${schedules != null and !#lists.isEmpty(schedules)}">
            <table class="schedule-table" id="scheduleTable">
                <thead>
                    <tr>
                        <th>Kelas</th>
                        <th>Tanggal &amp; Waktu</th>
                        <th>Lokasi</th>
                        <th style="width:120px; text-align:right;">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${schedules}">
                        <!-- Kelas -->
                        <td>
                            <div class="cell-class" th:text="${s.kelas.name}">Kelas A</div>
                            <div class="cell-course"
                                 th:text="${s.kelas.course != null ? s.kelas.course.name : '-'}">
                                Pemrograman Berorientasi Objek
                            </div>
                        </td>

                        <!-- Tanggal & Waktu -->
                        <td>
                            <span th:if="${s.effectiveDateTime != null}">
                                <span th:text="${#temporals.format(s.effectiveDateTime, 'EEE, dd MMM yyyy · HH:mm')}">Selasa, 02 Jun 2026 · 08:00</span>
                                <span th:if="${s.endDateTime != null}" th:text="${' - ' + #temporals.format(s.endDateTime, 'HH:mm')}"> - 10:00</span>
                            </span>
                            <span th:unless="${s.effectiveDateTime != null}" style="color:#b4bac0;">—</span>
                        </td>

                        <!-- Lokasi -->
                        <td>
                            <span class="badge-place">
                                <i class="ri-map-pin-line"></i>
                                <span th:text="${s.effectivePlace}">Ruang 4.0</span>
                            </span>
                        </td>

                        <!-- Actions -->
                        <td>
                            <div class="action-group" style="justify-content:flex-end;">
                                <!-- Edit -->
                                <a class="btn-icon edit"
                                   th:href="@{/admin/jadwal/edit/{id}(id=${s.id})}"
                                   title="Edit jadwal">
                                    <i class="ri-pencil-line"></i>
                                </a>
                                <!-- Delete -->
                                <button type="button"
                                        class="btn-icon delete"
                                        title="Hapus jadwal"
                                        th:attr="onclick='openDeleteDialog(' + ${s.id} + ')'">
                                    <i class="ri-delete-bin-line"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty state -->
        <div class="empty-state" th:if="${schedules == null or #lists.isEmpty(schedules)}">
            <i class="ri-calendar-2-line"></i>
            <p>Belum ada jadwal yang tersedia.</p>
        </div>
    </div>

    <!-- Delete confirmation dialog -->
    <dialog id="deleteDialog" class="confirm-dialog">
        <h3>Hapus Jadwal?</h3>
        <p>Jadwal yang dihapus tidak dapat dikembalikan. Yakin ingin melanjutkan?</p>
        <div class="confirm-actions">
            <button type="button" class="btn-outline"
                    onclick="document.getElementById('deleteDialog').close()">
                Batal
            </button>
            <a id="deleteConfirmBtn" class="btn-danger" href="#">
                <i class="ri-delete-bin-line" style="margin-right:6px;"></i>
                Hapus
            </a>
        </div>
    </dialog>

    <script>
        // Live search filter
        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('input', function () {
                const q = this.value.toLowerCase();
                document.querySelectorAll('#scheduleTable tbody tr').forEach(row => {
                    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
                });
            });
        }

        // Delete dialog
        function openDeleteDialog(id) {
            document.getElementById('deleteConfirmBtn').href = '/admin/jadwal/delete/' + id;
            document.getElementById('deleteDialog').showModal();
        }
    </script>
</div>
</body>
</html>
