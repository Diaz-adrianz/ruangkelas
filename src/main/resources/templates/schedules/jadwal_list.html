<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layouts/Home}">
<head>
    <title>Jadwal Perkuliahan</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style>
        /* Mempercantik tampilan kalender agar mirip dengan desain Anda */
        .fc .fc-toolbar-title { font-size: 1.2rem; font-weight: bold; }
        .fc-event { cursor: pointer; }
    </style>
</head>
<body>

<div layout:fragment="content" class="mx-auto max-w-5xl p-6">
    
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
        <h1 class="text-2xl font-bold mb-4" th:text="${classs.name} + ' - Jadwal Perkuliahan'">Nama Kelas</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            <div>
                <p class="text-gray-500">Kode Kelas</p>
                <p class="font-semibold" th:text="${classs.classCode}"></p>
            </div>
            <div>
                <p class="text-gray-500">Mata Kuliah</p>
                <p class="font-semibold" th:text="${classs.course.name}"></p>
            </div>
            <div>
                <p class="text-gray-500">Tahun Ajaran</p>
                <p class="font-semibold" th:text="${classs.year}"></p>
            </div>
            <div>
                <p class="text-gray-500">Dosen</p>
                <p class="font-semibold" th:text="${classs.lecturerName}"></p>
            </div>
        </div>

        <div class="mt-6">
            <button class="btn btn-primary"
                onclick="document.getElementById('tambahModal').showModal()">
                + Tambah Jadwal
            </button>

        </div>

    <div id="calendar" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"></div>

    <dialog id="tambahModal" class="modal">
        <div class="modal-box">

            <h3 class="font-bold text-lg mb-4">
                Tambah Jadwal Baru
            </h3>

            <form th:action="@{/admin/jadwal/save}" method="post">

                <input type="hidden"
                    name="kelas.id"
                    th:value="${classs.id}" />

                <input type="hidden"
                    name="kelas.classCode"
                    th:value="${classs.classCode}" />

                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Nama Mata Kuliah</span>
                    </label>
                    <input type="text"
                        name="namaMatkul"
                        class="input input-bordered"
                        required />
                </div>

                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Tanggal Kuliah</span>
                    </label>
                    <input type="date"
                        name="tanggalKuliah"
                        class="input input-bordered"
                        required />
                </div>

                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Hari</span>
                    </label>
                    <input type="text"
                        name="hari"
                        class="input input-bordered"
                        placeholder="Senin"
                        required />
                </div>

                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Jam Mulai</span>
                    </label>
                    <input type="time"
                        name="jamMulai"
                        class="input input-bordered"
                        required />
                </div>

                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Jam Selesai</span>
                    </label>
                    <input type="time"
                        name="jamSelesai"
                        class="input input-bordered"
                        required />
                </div>

                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Ruangan</span>
                    </label>
                    <input type="text"
                        name="ruangan"
                        class="input input-bordered"
                        required />
                </div>

                <div class="form-control mb-3">
                    <label class="label">
                        <span class="label-text">Nama Dosen</span>
                    </label>
                    <input type="text"
                        name="namaDosen"
                        class="input input-bordered"
                        required />
                </div>

                <div class="modal-action">
                    <button type="submit"
                            class="btn btn-primary">
                        Simpan
                    </button>

                    <button type="button"
                            class="btn"
                            onclick="document.getElementById('tambahModal').close()">
                        Batal
                    </button>
                </div>

            </form>

        </div>
    </dialog>

    <dialog id="detailModal" class="modal">
        <div class="modal-box">
            <h3 class="font-bold text-lg mb-4">
                Detail Jadwal
            </h3>

            <div class="space-y-2">
                <p><b>Mata Kuliah:</b> <span id="detailMatkul"></span></p>
                <p><b>Jam:</b> <span id="detailJam"></span></p>
                <p><b>Ruangan:</b> <span id="detailRuangan"></span></p>
                <p><b>Dosen:</b> <span id="detailDosen"></span></p>
            </div>

            <div class="modal-action">

                <a id="editScheduleBtn"
                class="btn btn-warning">
                    Edit
                </a>

                <a id="deleteScheduleBtn"
                class="btn btn-error"
                onclick="return confirm('Yakin ingin menghapus jadwal ini?')">
                    Hapus
                </a>

                <button class="btn"
                        onclick="document.getElementById('detailModal').close()">
                    Tutup
                </button>

            </div>
        </div>
    </dialog>

     <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {

            const calendarEl = document.getElementById('calendar');

            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',

                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },

                events: '/api/jadwal/data?classId=[[${classs.id}]]',

               eventClick: function(info) {

                    document.getElementById('detailMatkul').textContent =
                        info.event.title;

                    document.getElementById('detailJam').textContent =
                        info.event.extendedProps.jamMulai +
                        " - " +
                        info.event.extendedProps.jamSelesai;

                    document.getElementById('detailRuangan').textContent =
                        info.event.extendedProps.ruangan;

                    document.getElementById('detailDosen').textContent =
                        info.event.extendedProps.dosen;

                    document.getElementById('deleteScheduleBtn').href =
                        '/admin/jadwal/delete/' + info.event.id;

                    document.getElementById('editScheduleBtn').href =
                    '/admin/jadwal/edit/' + info.event.id;    

                    document.getElementById('detailModal').showModal();
                }

            });

            calendar.render();
        });
        </script>

    <!-- TAMBAHKAN INI -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</div>

</body>
</html>
