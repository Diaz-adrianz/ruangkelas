<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Jadwal Kuliah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <h2 class="mb-4">Fitur Jadwal Kuliah</h2>

    <div class="card p-3 mb-4 shadow-sm">
        <h5 class="card-title">Tambah Jadwal Baru</h5>
        <form th:action="@{/admin/jadwal/save}" th:object="${schedule}" method="post" class="row g-2">
            <input type="hidden" th:field="*{id}">
            
            <div class="col-md-3">
                <input type="text" th:field="*{namaMatkul}" class="form-control" placeholder="Nama Mata Kuliah" required>
            </div>
            <div class="col-md-2">
                <input type="text" th:field="*{jamMatkul}" class="form-control" placeholder="Jam" required>
            </div>
            <div class="col-md-2">
                <input type="text" th:field="*{ruangan}" class="form-control" placeholder="Ruangan" required>
            </div>
            <div class="col-md-3">
                <input type="text" th:field="*{namaDosen}" class="form-control" placeholder="Nama Dosen" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Simpan</button>
            </div>
        </form>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Mata Kuliah</th>
                <th>Jam</th>
                <th>Ruangan</th>
                <th>Nama Dosen</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s, stat : ${schedules}">
                <td th:text="${stat.count}">1</td>
                <td th:text="${s.namaMatkul}">Matkul</td>
                <td th:text="${s.jamMatkul}">Jam</td>
                <td th:text="${s.ruangan}">Ruangan</td>
                <td th:text="${s.namaDosen}">Dosen</td>
                <td>
                    <a th:href="@{'/admin/jadwal/delete/' + ${s.id}}" 
                       class="btn btn-danger btn-sm" 
                       onclick="return confirm('Apakah Anda yakin ingin menghapus jadwal ini?')">
                       Hapus
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(schedules)}">
                <td colspan="6" class="text-center">Belum ada jadwal kuliah yang terdaftar.</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
