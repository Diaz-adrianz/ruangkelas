<!doctype html>
<html
    xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/Home}"
>
<head>
    <title>Edit Jadwal</title>
</head>
<body>
<div layout:fragment="content" class="mx-auto max-w-xl p-6">
    <div class="breadcrumbs text-sm mb-4">
        <ul>
            <li><a th:href="@{/}">Beranda</a></li>
            <li><a th:href="@{/class/{classCode}/jadwal(classCode=${schedule.kelas.classCode})}">Jadwal</a></li>
            <li>Edit</li>
        </ul>
    </div>

    <h1 class="typo-heading-lg mb-6">Edit Jadwal</h1>

    <form th:action="@{/admin/jadwal/update/{id}(id=${schedule.id})}" method="post" class="space-y-4">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label class="form-control">
            <span class="label-text mb-1">Tanggal dan jam</span>
            <input
                type="datetime-local"
                name="dateTime"
                class="input input-bordered"
                th:value="${schedule.effectiveDateTime != null ? #temporals.format(schedule.effectiveDateTime, 'yyyy-MM-dd''T''HH:mm') : ''}"
                required
            />
        </label>

        <label class="form-control">
            <span class="label-text mb-1">Ruangan</span>
            <input
                type="text"
                name="place"
                class="input input-bordered"
                th:value="${schedule.effectivePlace}"
                required
            />
        </label>

        <div class="flex justify-end gap-2 pt-2">
            <a class="btn" th:href="@{/class/{classCode}/jadwal(classCode=${schedule.kelas.classCode})}">Batal</a>
            <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
        </div>
    </form>
</div>
</body>
</html>
