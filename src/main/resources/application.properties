spring.application.name=ruangkelas
spring.config.import=optional:file:.env[.properties]

# server 
server.port=8080
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure= true            
server.servlet.session.cookie.same-site= strict
server.servlet.session.cookie.name= APP_SESSION
server.servlet.session.cookie.max-age= 86400
server.error.include-message=always
server.error.include-stacktrace=always

# database 
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Firebase
firebase.apiKey=${FIREBASE_APIKEY}
firebase.authDomain=${FIREBASE_AUTHDOMAIN}
firebase.projectId=${FIREBASE_PROJECTID}
firebase.storageBucket=${FIREBASE_STORAGEBUCKET}
firebase.messagingSenderId=${FIREBASE_MESSAGINGSENDERID}
firebase.appId=${FIREBASE_APPID}
firebase.vapidKey=${FIREBASE_VAPIDKEY}
